<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Screen 1 — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #121212;
    --surface: #1E1E1E;
    --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --text-dim: #8A8A8A;
    --accent: #00FF66;
    --accent-glow: rgba(0,255,102,0.25);
    --red: #FF4D4D;
    --radius: 14px;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    max-width: 390px;
    height: 844px;
    margin: 0 auto;
    position: relative;
    border: 1px solid var(--border);
  }

  /* Status Bar */
  .status-zone {
    padding: 48px 24px 0;
    text-align: center;
  }
  .status-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    transition: color 0.4s;
  }
  .status-label.connected { color: var(--accent); }

  .metrics {
    display: flex;
    justify-content: center;
    gap: 32px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    transition: opacity 0.4s;
  }
  .metrics .val {
    color: var(--text);
    font-size: 15px;
    font-weight: 500;
    display: block;
    margin-bottom: 2px;
  }
  .metrics .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  /* Connect Button */
  .connect-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .connect-btn {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 4px solid var(--text-dim);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: border-color 0.5s, box-shadow 0.5s;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }
  .connect-btn:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 4px;
  }

  .connect-btn::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    background: transparent;
    transition: background 0.6s, box-shadow 0.6s;
  }

  .connect-btn::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: transparent;
    transition: all 0.8s;
  }

  .connect-btn.connected { border-color: var(--accent); }
  .connect-btn.connected::before {
    background: var(--accent-glow);
    box-shadow: 0 0 40px 10px var(--accent-glow), 0 0 80px 20px rgba(0,255,102,0.08);
  }
  .connect-btn.connected::after {
    border-color: transparent;
    border-top-color: var(--accent);
    border-right-color: rgba(0,255,102,0.4);
    animation: ring-spin 3s linear infinite;
  }

  @keyframes ring-spin { to { transform: rotate(360deg); } }

  .logo-in-circle {
    width: 80px; height: 80px;
    object-fit: contain;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    transition: opacity 0.5s ease;
  }
  .logo-dim { opacity: 1; }
  .logo-bright { opacity: 0; }
  .connect-btn.connected .logo-dim { opacity: 0; }
  .connect-btn.connected .logo-bright {
    opacity: 1;
    animation: pulse-icon 2s ease-in-out infinite;
  }

  @keyframes pulse-icon {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.08); }
  }

  .connect-btn:active { transform: scale(0.97); transition: transform 0.1s; }

  /* Server Card */
  .server-card {
    margin: -50px 24px 16px;
    padding: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    backdrop-filter: blur(12px);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .server-card:active {
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.12);
  }
  .server-card .server-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .server-card .server-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.3px;
  }
  .server-card .server-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    margin-top: 8px;
  }

  /* Bottom Nav */
  .bottom-nav {
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0 32px 28px; flex-shrink: 0; position: relative;
  }
  .nav-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; padding: 10px 0;
    color: var(--text-dim); transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 26px; height: 26px; }

  .page-label {
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding-bottom: 8px;
  }

  @media (min-width: 600px) {
    body { margin: 24px auto; border-radius: 32px; border: 2px solid var(--border); box-shadow: 0 0 60px rgba(0,0,0,0.8); }
    html { background: #0A0A0A; display: flex; min-height: 100vh; }
  }
</style>
</head>
<body>

<div class="status-zone">
  <div class="status-label" id="statusLabel">Disconnected</div>
</div>

<div class="metrics" id="metrics" style="opacity:0.35;">
  <div>
    <span class="val" id="sessionTime">00:00:00</span>
    <span class="label">Session</span>
  </div>
  <div>
    <span class="val" id="dlSpeed">0</span>
    <span class="label">Download pkts</span>
  </div>
  <div>
    <span class="val" id="ulSpeed">0</span>
    <span class="label">Upload pkts</span>
  </div>
</div>

<div class="connect-area">
  <button class="connect-btn" id="connectBtn" aria-label="Toggle VPN connection">
    <img class="logo-in-circle logo-dim" src="assets/secular1-white.svg" alt="">
    <img class="logo-in-circle logo-bright" src="assets/secular1-green.svg" alt="">
  </button>
</div>

<div class="server-card" id="serverCard" onclick="window.location.href='screen2.html'">
  <div class="server-name">Frankfurt #1</div>
  <div class="server-meta">TrustTunnel · 185.103.24.4:443</div>
  <div class="server-hint">Tap to change server</div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn" onclick="window.location.href='screen5.html'" aria-label="Query log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <path d="M6 2h10l4 4v16a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1z"/>
      <path d="M16 2v4a1 1 0 001 1h4"/>
      <line x1="9" y1="9" x2="15" y2="9"/>
      <line x1="9" y1="12" x2="15" y2="12"/>
      <line x1="9" y1="15" x2="13" y2="15"/>
      <path d="M19 4l-4-4v3a1 1 0 001 1h3z" fill="currentColor" stroke="none" opacity="0.12"/>
    </svg>
  </button>
  <button class="nav-btn home active" onclick="window.location.href='screen1.html'" aria-label="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <path d="M3 9.5l9-7 9 7"/>
      <path d="M5 10v9a1 1 0 001 1h12a1 1 0 001-1v-9"/>
    </svg>
  </button>
  <button class="nav-btn" onclick="window.location.href='screen4.html'" aria-label="Add server">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</nav>

<div class="page-label">Screen 1 · Dashboard</div>

<script>
  const btn = document.getElementById('connectBtn');
  const statusLabel = document.getElementById('statusLabel');
  const metrics = document.getElementById('metrics');
  let connected = false;
  let timerInterval = null;
  let seconds = 0;
  let dlPackets = 0;
  let ulPackets = 0;

  function formatTime(s) {
    const h = String(Math.floor(s/3600)).padStart(2,'0');
    const m = String(Math.floor((s%3600)/60)).padStart(2,'0');
    const sec = String(s%60).padStart(2,'0');
    return `${h}:${m}:${sec}`;
  }

  btn.addEventListener('click', () => {
    connected = !connected;
    btn.classList.toggle('connected', connected);
    statusLabel.textContent = connected ? 'Connected' : 'Disconnected';
    statusLabel.classList.toggle('connected', connected);
    if (connected) {
      metrics.style.opacity = '1';
      seconds = 0;
      dlPackets = 0;
      ulPackets = 0;
      document.getElementById('dlSpeed').textContent = '0';
      document.getElementById('ulSpeed').textContent = '0';
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('sessionTime').textContent = formatTime(seconds);
        dlPackets += Math.floor(Math.random() * 80 + 20);
        ulPackets += Math.floor(Math.random() * 30 + 10);
        document.getElementById('dlSpeed').textContent = dlPackets;
        document.getElementById('ulSpeed').textContent = ulPackets;
      }, 1000);
    } else {
      metrics.style.opacity = '0.35';
      clearInterval(timerInterval);
      document.getElementById('sessionTime').textContent = '00:00:00';
      document.getElementById('dlSpeed').textContent = '0';
      document.getElementById('ulSpeed').textContent = '0';
    }
  });
</script>
</body>
</html>
