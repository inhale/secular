<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Screen 2 — Server List</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #121212; --surface: #1E1E1E; --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08); --text: #FFFFFF; --text-dim: #8A8A8A;
    --accent: #00FF66; --red: #FF4D4D; --radius: 14px;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
    max-width: 390px; height: 844px; margin: 0 auto;
    position: relative; border: 1px solid var(--border);
  }
  .header {
    padding: 48px 24px 16px; flex-shrink: 0;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }

  .server-list { flex: 1; overflow-y: auto; padding: 0 16px; scrollbar-width: none; }
  .server-list::-webkit-scrollbar { display: none; }

  .server-item {
    display: flex; align-items: center; padding: 14px 8px;
    border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background 0.15s; border-radius: 10px;
  }
  .server-item:active { background: rgba(255,255,255,0.04); }
  .server-item.selected { background: rgba(0,255,102,0.06); }

  .flag {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0; margin-right: 14px;
    background: rgba(255,255,255,0.06);
  }
  .server-info { flex: 1; min-width: 0; }
  .server-info .name {
    font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .server-info .meta {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.3px;
  }
  .ping {
    display: flex; align-items: center; gap: 5px; margin-right: 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); flex-shrink: 0;
  }
  .ping-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .ping-dot.excellent { background: var(--accent); }
  .ping-dot.good { background: #A8E063; }
  .ping-dot.ok { background: #FFD93D; }
  .ping-dot.bad { background: var(--red); }

  .gear-btn {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    padding: 8px; border-radius: 8px; transition: color 0.15s, background 0.15s;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .gear-btn:active { color: var(--accent); background: rgba(0,255,102,0.08); }
  .gear-btn svg { width: 20px; height: 20px; }

  .bottom-nav {
    display: flex; align-items: center; justify-content: center;
    padding: 0 32px 36px; flex-shrink: 0; position: relative;
  }
  .nav-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; padding: 10px 0;
    color: var(--text-dim); transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 26px; height: 26px; }
  .nav-btn.home .home-circle {
    width: 52px; height: 52px;
    background: var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; color: #121212;
    margin-top: -12px; box-shadow: 0 4px 24px rgba(0,255,102,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .nav-btn.home:active .home-circle {
    transform: scale(0.93); box-shadow: 0 2px 12px rgba(0,255,102,0.25);
  }
  .nav-btn.add .add-circle {
    width: 40px; height: 40px;
    border: 2px solid var(--text-dim); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; color: var(--text-dim);
    transition: transform 0.15s;
  }
  .nav-btn.add:active .add-circle {
    transform: scale(0.93); border-color: var(--accent); color: var(--accent);
  }
  .page-label {
    text-align: center; font-size: 11px; color: rgba(255,255,255,0.2);
    letter-spacing: 2px; text-transform: uppercase; padding-bottom: 8px;
  }
  @media (min-width: 600px) {
    body { margin: 24px auto; border-radius: 32px; border: 2px solid var(--border); box-shadow: 0 0 60px rgba(0,0,0,0.8); }
    html { background: #0A0A0A; display: flex; min-height: 100vh; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>My Servers</h1>
</header>

<div class="server-list" id="serverList"></div>

<nav class="bottom-nav">
  <button class="nav-btn active" aria-label="Server list">
    <svg viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="8" height="8" rx="1.5"/>
      <rect x="16" y="2" width="8" height="8" rx="1.5"/>
      <rect x="2" y="16" width="8" height="8" rx="1.5"/>
      <rect x="16" y="16" width="8" height="8" rx="1.5"/>
    </svg>
  </button>
  <button class="nav-btn home" onclick="window.location.href='screen1.html'" aria-label="Home">
    <div class="home-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
        <path d="M3 9.5l9-7 9 7"/>
        <path d="M5 10v9a1 1 0 001 1h12a1 1 0 001-1v-9"/>
      </svg>
    </div>
  </button>
  <button class="nav-btn add" onclick="window.location.href='screen4.html'" aria-label="Add server">
    <div class="add-circle">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="20" height="20">
        <line x1="10" y1="4" x2="10" y2="16"/>
        <line x1="4" y1="10" x2="16" y2="10"/>
      </svg>
    </div>
  </button>
</nav>

<div class="page-label">Screen 2 · Servers</div>

<script>
const servers = [
  { name: 'Frankfurt #1',  flag: '🇩🇪', ip: '185.103.24.4:443',    ping: 24,  selected: true },
  { name: 'Amsterdam #3',  flag: '🇳🇱', ip: '104.248.82.1:8443',   ping: 41,  selected: false },
  { name: 'Stockholm #2',  flag: '🇸🇪', ip: '91.132.137.2:443',    ping: 67,  selected: false },
  { name: 'New York #1',   flag: '🇺🇸', ip: '45.33.32.156:1080',   ping: 112, selected: false },
  { name: 'Tokyo #5',      flag: '🇯🇵', ip: '139.162.68.2:443',    ping: 189, selected: false },
  { name: 'Singapore #2',  flag: '🇸🇬', ip: '103.253.146.1:8443',  ping: 203, selected: false },
  { name: 'London #1',     flag: '🇬🇧', ip: '178.62.52.11:443',    ping: 38,  selected: false },
  { name: 'Helsinki #4',   flag: '🇫🇮', ip: '95.216.204.1:1080',   ping: 55,  selected: false },
];
function pingClass(ms) {
  if (ms < 40) return 'excellent';
  if (ms < 80) return 'good';
  if (ms < 150) return 'ok';
  return 'bad';
}
const gearSvg = `<svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"><path d="M128,72a56,56,0,1,0,56,56A56.06,56.06,0,0,0,128,72Zm0,104a48,48,0,1,1,48-48A48.05,48.05,0,0,1,128,176Zm107.5-21.5l-17.5-23.3c.08-2.8.02-6.4-.02-8.5l17.5-23.4a4,4,0,0,0,.7-3.7,115.7,115.7,0,0,0-11.3-27.3,4,4,0,0,0-3.1-2.1l-27.7-4c-1.9-2.1-3.9-4-6-6l-4-27.7a4,4,0,0,0-2.1-3.1,115.7,115.7,0,0,0-27.3-11.3,4,4,0,0,0-3.7.7l-23.3,17.5c-2.8-.1-5.6-.1-8.4,0L83.8,26.8a4,4,0,0,0-3.7-.7A115.7,115.7,0,0,0,52.8,37.4a4,4,0,0,0-2.1,3.1l-4,27.7c-2.1,1.9-4,3.9-6,6l-27.7,4a4,4,0,0,0-3.1,2.1A115.7,115.7,0,0,0,.6,107.6a4,4,0,0,0,.7,3.7l17.5,23.3c-.08,2.8-.02,6.4.02,8.5L1.3,166.5a4,4,0,0,0-.7,3.7,115.7,115.7,0,0,0,11.3,27.3,4,4,0,0,0,3.1,2.1l27.7,4c1.9,2.1,3.9,4,6,6l4,27.7a4,4,0,0,0,2.1,3.1,115.7,115.7,0,0,0,27.3,11.3,4,4,0,0,0,3.7-.7l23.3-17.5c2.8.1,5.6.1,8.4,0l23.3,17.5a4,4,0,0,0,3.7.7,115.7,115.7,0,0,0,27.3-11.3,4,4,0,0,0,2.1-3.1l4-27.7c2.1-1.9,4.1-4.1,6-6l27.7-4a4,4,0,0,0,3.1-2.1,115.7,115.7,0,0,0,11.3-27.3A4,4,0,0,0,235.5,154.5Zm-16.8,24.6l-27.1,3.9a4,4,0,0,0-2.5,1.3c-.05.05-4.9,5.2-7.5,7.5a4,4,0,0,0-1.4,2.6l-3.9,27.1a107.5,107.5,0,0,1-21.5,8.9l-22-16.5a4,4,0,0,0-2.8-.9,88.3,88.3,0,0,1-10.5,0,4,4,0,0,0-2.8.9l-22,16.5a107.5,107.5,0,0,1-21.5-8.9l-3.9-27.1a4,4,0,0,0-1.4-2.6,88.3,88.3,0,0,1-7.5-7.5,4,4,0,0,0-2.6-1.4l-27.1-3.9a107.5,107.5,0,0,1-8.9-21.5l16.5-22a4,4,0,0,0,.9-2.7c0-.07-.2-7.2-.01-10.6a4,4,0,0,0-.9-2.8l-16.5-22a107.5,107.5,0,0,1,8.9-21.5l27.1-3.9a4,4,0,0,0,2.6-1.4,88.3,88.3,0,0,1,7.5-7.5,4,4,0,0,0,1.4-2.6l3.9-27.1a107.5,107.5,0,0,1,21.5-8.9l22,16.5a4,4,0,0,0,2.8.9,88.3,88.3,0,0,1,10.5,0,4,4,0,0,0,2.8-.9l22-16.5a107.5,107.5,0,0,1,21.5,8.9l3.9,27.1a4,4,0,0,0,1.4,2.6,88.3,88.3,0,0,1,7.5,7.5,4,4,0,0,0,2.6,1.4l27.1,3.9a107.5,107.5,0,0,1,8.9,21.5l-16.5,22a4,4,0,0,0,.9,2.7c0,.07.2,7.2.01,10.6a4,4,0,0,0,.9,2.8l16.5,22A107.5,107.5,0,0,1,218.7,179.1Z"/></svg>`;

const list = document.getElementById('serverList');
servers.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'server-item' + (s.selected ? ' selected' : '');
  el.innerHTML = `
    <div class="flag">${s.flag}</div>
    <div class="server-info">
      <div class="name">${s.name}</div>
      <div class="meta">TrustTunnel · ${s.ip}</div>
    </div>
    <div class="ping">
      <span class="ping-dot ${pingClass(s.ping)}"></span>
      ${s.ping}ms
    </div>
    <button class="gear-btn" onclick="event.stopPropagation(); window.location.href='screen3.html'" aria-label="Edit">
      ${gearSvg}
    </button>
  `;
  el.addEventListener('click', () => {
    document.querySelectorAll('.server-item').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
    setTimeout(() => { window.location.href = 'screen1.html'; }, 400);
  });
  list.appendChild(el);
});
</script>
</body>
</html>
