<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Screen 2 — Server List</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #121212; --surface: #1E1E1E; --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08); --text: #FFFFFF; --text-dim: #8A8A8A;
    --accent: #00FF66; --red: #FF4D4D; --radius: 14px;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
    max-width: 390px; height: 844px; margin: 0 auto;
    position: relative; border: 1px solid var(--border);
  }
  .header {
    padding: 48px 24px 16px; flex-shrink: 0;
  }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }

  .server-list { flex: 1; overflow-y: auto; padding: 0 16px; scrollbar-width: none; }
  .server-list::-webkit-scrollbar { display: none; }

  .server-item {
    display: flex; align-items: center; padding: 14px 12px;
    border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background 0.15s; border-radius: 10px;
  }
  .server-item:active { background: rgba(255,255,255,0.04); }
  .server-item.selected {
    background: rgba(0,255,102,0.06);
    border: 1px solid rgba(0,255,102,0.2);
    border-radius: 10px;
    margin-bottom: 2px;
  }

  /* Default badge */
  .default-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(0,255,102,0.1); border: 1px solid rgba(0,255,102,0.25);
    border-radius: 6px; padding: 3px 8px;
    font-size: 10px; font-weight: 700; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 6px;
  }
  .default-badge svg { width: 10px; height: 10px; }

  .server-info { flex: 1; min-width: 0; }
  .server-info .name {
    font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .server-info .meta {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.3px;
  }

  .gear-btn {
    background: none; border: none; color: rgba(255,255,255,0.2); cursor: pointer;
    padding: 6px; border-radius: 8px; transition: color 0.15s, background 0.15s;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    margin-left: 4px;
  }
  .gear-btn:hover { color: var(--text); }
  .gear-btn:active { color: var(--accent); background: rgba(0,255,102,0.08); }
  .gear-btn svg { width: 18px; height: 18px; }

  /* Bottom Nav */
  .bottom-nav {
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0 32px 28px; flex-shrink: 0; position: relative;
  }
  .nav-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; padding: 10px 0;
    color: var(--text-dim); transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 26px; height: 26px; }

  .page-label {
    text-align: center; font-size: 11px; color: rgba(255,255,255,0.2);
    letter-spacing: 2px; text-transform: uppercase; padding-bottom: 8px;
  }
  @media (min-width: 600px) {
    body { margin: 24px auto; border-radius: 32px; border: 2px solid var(--border); box-shadow: 0 0 60px rgba(0,0,0,0.8); }
    html { background: #0A0A0A; display: flex; min-height: 100vh; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>My Servers</h1>
</header>

<div class="server-list" id="serverList"></div>

<nav class="bottom-nav">
  <button class="nav-btn" onclick="window.location.href='screen5.html'" aria-label="Query log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <path d="M6 2h10l4 4v16a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1z"/>
      <path d="M16 2v4a1 1 0 001 1h4"/>
      <line x1="9" y1="9" x2="15" y2="9"/>
      <line x1="9" y1="12" x2="15" y2="12"/>
      <line x1="9" y1="15" x2="13" y2="15"/>
      <path d="M19 4l-4-4v3a1 1 0 001 1h3z" fill="currentColor" stroke="none" opacity="0.12"/>
    </svg>
  </button>
  <button class="nav-btn home" onclick="window.location.href='screen1.html'" aria-label="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <path d="M3 9.5l9-7 9 7"/>
      <path d="M5 10v9a1 1 0 001 1h12a1 1 0 001-1v-9"/>
    </svg>
  </button>
  <button class="nav-btn" onclick="window.location.href='screen4.html'" aria-label="Add server">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</nav>

<div class="page-label">Screen 2 · Servers</div>

<script>
const servers = [
  { name: 'Frankfurt #1',  ip: '185.103.24.4:443',    selected: true,  isDefault: true },
  { name: 'Amsterdam #3',  ip: '104.248.82.1:8443',   selected: false, isDefault: false },
  { name: 'Stockholm #2',  ip: '91.132.137.2:443',    selected: false, isDefault: false },
  { name: 'New York #1',   ip: '45.33.32.156:1080',   selected: false, isDefault: false },
  { name: 'Tokyo #5',      ip: '139.162.68.2:443',    selected: false, isDefault: false },
  { name: 'Singapore #2',  ip: '103.253.146.1:8443',  selected: false, isDefault: false },
  { name: 'London #1',     ip: '178.62.52.11:443',    selected: false, isDefault: false },
  { name: 'Helsinki #4',   ip: '95.216.204.1:1080',   selected: false, isDefault: false },
];

const gearSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>`;

const defaultBadgeSvg = `<svg viewBox="0 0 256 256" fill="currentColor"><path d="M224.5,136.5l-35.3-14.1a65.1,65.1,0,0,0,0-32.8l35.3-14.1a7.9,7.9,0,0,0,4.4-10.1,111.9,111.9,0,0,0-15.3-36.3,7.9,7.9,0,0,0-10.7-2.7l-35.3,14.1a65.1,65.1,0,0,0-28.3-16.4V8.8a8,8,0,0,0-6.9-7.9,112.2,112.2,0,0,0-40.2,0,8,8,0,0,0-6.9,7.9V44.1A65.1,65.1,0,0,0,57.1,50.5L21.8,36.4a7.9,7.9,0,0,0-10.7,2.7A111.9,111.9,0,0,0,5.8,75.4a7.9,7.9,0,0,0,4.4,10.1L45.5,99.6a65.1,65.1,0,0,0,0,32.8L10.2,146.5a7.9,7.9,0,0,0-4.4,10.1,111.9,111.9,0,0,0,15.3,36.3,7.9,7.9,0,0,0,10.7,2.7l35.3-14.1a65.1,65.1,0,0,0,28.3,16.4v35.3a8,8,0,0,0,6.9,7.9,112.2,112.2,0,0,0,40.2,0,8,8,0,0,0,6.9-7.9V207.9a65.1,65.1,0,0,0,28.3-16.4l35.3,14.1a7.9,7.9,0,0,0,10.7-2.7,111.9,111.9,0,0,0,15.3-36.3A7.9,7.9,0,0,0,224.5,136.5Z"/></svg>`;

const list = document.getElementById('serverList');
servers.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'server-item' + (s.selected ? ' selected' : '');
  el.innerHTML = `
    <div class="server-info">
      ${s.isDefault ? `<div class="default-badge"><span style="display:flex;">${defaultBadgeSvg.replace('<svg', '<svg style="width:10px;height:10px;"')}</span>Default</div>` : ''}
      <div class="name">${s.name}</div>
      <div class="meta">TrustTunnel · ${s.ip}</div>
    </div>
    <button class="gear-btn" onclick="event.stopPropagation(); window.location.href='screen3.html'" aria-label="Edit">
      ${gearSvg}
    </button>
  `;
  el.addEventListener('click', () => {
    document.querySelectorAll('.server-item').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
    setTimeout(() => { window.location.href = 'screen1.html'; }, 400);
  });
  list.appendChild(el);
});
</script>
</body>
</html>
