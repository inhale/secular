<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Screen 4 — Add Server</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #121212; --surface: #1E1E1E; --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08); --text: #FFFFFF; --text-dim: #8A8A8A;
    --accent: #00FF66; --accent-glow: rgba(0,255,102,0.15); --radius: 14px;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
    max-width: 390px; height: 844px; margin: 0 auto;
    position: relative; border: 1px solid var(--border);
  }
  .header {
    padding: 44px 24px 6px; flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 700; }

  .content { flex: 1; overflow-y: auto; padding: 12px 24px; scrollbar-width: none; }
  .content::-webkit-scrollbar { display: none; }

  .section { margin-bottom: 14px; }
  .section-label {
    font-size: 11px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
  }
  .link-input-row { display: flex; gap: 8px; align-items: center; }
  .link-input {
    flex: 1; background: rgba(255,255,255,0.04); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 10px 14px; font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text); outline: none; transition: border-color 0.2s;
  }
  .link-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,255,102,0.1); }
  .link-input::placeholder { color: rgba(255,255,255,0.18); font-family: 'Inter', sans-serif; }
  .add-btn {
    flex-shrink: 0; background: var(--accent); color: #121212; border: none;
    border-radius: 10px; padding: 10px 18px; font-family: 'Inter', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 2px 16px rgba(0,255,102,0.2); white-space: nowrap;
  }
  .add-btn:active { transform: scale(0.96); box-shadow: 0 1px 8px rgba(0,255,102,0.15); }
  .hint { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 6px; line-height: 1.4; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 2px 0 14px; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }

  .option-btn {
    width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--border); border-radius: 12px; color: var(--text);
    cursor: pointer; display: flex; flex-direction: row; align-items: center;
    gap: 14px; transition: border-color 0.2s, background 0.2s;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px;
  }
  .option-btn:active { border-color: var(--accent); background: rgba(0,255,102,0.04); }
  .option-btn svg { color: var(--accent); flex-shrink: 0; }
  .option-btn .sub { display: none; }

  .upload-zone {
    width: 100%; padding: 14px 16px; border: 2px dashed var(--border); border-radius: 12px;
    display: flex; flex-direction: row; align-items: center; gap: 14px;
    cursor: pointer; transition: border-color 0.2s, background 0.2s; background: rgba(255,255,255,0.02);
  }
  .upload-zone:active { border-color: var(--accent); background: rgba(0,255,102,0.03); }
  .upload-zone .upload-icon { color: var(--accent); flex-shrink: 0; }
  .upload-zone .upload-text { font-size: 14px; font-weight: 600; color: var(--text); }
  .upload-zone .upload-sub { display: none; }

  .scanner-overlay {
    display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.92);
    z-index: 50; flex-direction: column; align-items: center; justify-content: center;
  }
  .scanner-overlay.show { display: flex; }
  .scanner-frame {
    width: 220px; height: 220px; border: 2px solid var(--accent);
    border-radius: 20px; position: relative; box-shadow: 0 0 30px rgba(0,255,102,0.15);
  }
  .scanner-line {
    position: absolute; left: 10px; right: 10px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan-move 2s ease-in-out infinite;
  }
  @keyframes scan-move { 0% { top: 10px; } 50% { top: calc(100% - 12px); } 100% { top: 10px; } }
  .scanner-text { color: var(--text-dim); font-size: 13px; margin-top: 24px; }
  .scanner-close {
    position: absolute; top: 48px; right: 24px; background: none; border: none;
    color: var(--text-dim); font-size: 24px; cursor: pointer; padding: 8px; line-height: 1;
  }

  /* Bottom Nav */
  .bottom-nav {
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0 32px 28px; flex-shrink: 0; position: relative;
  }
  .nav-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; padding: 10px 0;
    color: var(--text-dim); transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 26px; height: 26px; }

  .page-label {
    text-align: center; font-size: 11px; color: rgba(255,255,255,0.15);
    letter-spacing: 2px; text-transform: uppercase; padding-bottom: 10px;
  }
  @media (min-width: 600px) {
    body { margin: 24px auto; border-radius: 32px; border: 2px solid var(--border); box-shadow: 0 0 60px rgba(0,0,0,0.8); }
    html { background: #0A0A0A; display: flex; min-height: 100vh; }
  }
</style>
</head>
<body>

<div class="scanner-overlay" id="scannerOverlay">
  <button class="scanner-close" onclick="closeScanner()">✕</button>
  <div class="scanner-frame"><div class="scanner-line"></div></div>
  <p class="scanner-text">Point camera at QR code</p>
</div>

<header class="header">
  <h1>Add Connection</h1>
</header>

<div class="content">
  <div class="section">
    <div class="section-label">Insert Link</div>
    <div class="link-input-row">
      <input class="link-input" type="text" placeholder="Paste tt:// or ss:// link" id="linkInput" />
      <button class="add-btn" onclick="addFromLink()">Add</button>
    </div>
    <p class="hint">Supports Outline, Shadowsocks, VLESS keys</p>
  </div>

  <div class="divider"><div class="divider-line"></div><span class="divider-text">or</span><div class="divider-line"></div></div>

  <div class="section">
    <button class="option-btn" onclick="openScanner()">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32">
        <rect x="4" y="4" width="16" height="16" rx="3"/>
        <rect x="28" y="4" width="16" height="16" rx="3"/>
        <rect x="4" y="28" width="16" height="16" rx="3"/>
        <rect x="28" y="28" width="4" height="4" rx="0.5"/>
        <rect x="36" y="28" width="4" height="4" rx="0.5" opacity="0.5"/>
        <rect x="28" y="36" width="4" height="4" rx="0.5" opacity="0.5"/>
        <rect x="36" y="36" width="4" height="4" rx="0.5" opacity="0.5"/>
      </svg>
      <span>Scan QR Code</span>
    </button>
  </div>

  <div class="divider"><div class="divider-line"></div><span class="divider-text">or</span><div class="divider-line"></div></div>

  <div class="section">
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" hidden accept=".toml,.json,.yaml" />
      <span class="upload-icon">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="32" height="32">
          <path d="M28 4H12a2 2 0 00-2 2v36a2 2 0 002 2h24a2 2 0 002-2V14L28 4z"/>
          <polyline points="28,4 28,14 38,14"/>
          <line x1="16" x2="32" y1="28" y2="28"/>
          <line x1="16" x2="26" y1="34" y2="34"/>
        </svg>
      </span>
      <span class="upload-text">Upload .toml file</span>
    </div>
  </div>

  <div class="divider"><div class="divider-line"></div><span class="divider-text">or</span><div class="divider-line"></div></div>

  <div class="section">
    <button class="option-btn" onclick="window.location.href='screen3.html'">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="32" height="32">
        <line x1="24" y1="10" x2="24" y2="38"/>
        <line x1="10" y1="24" x2="38" y2="24"/>
      </svg>
      <span>Add Server Manually</span>
    </button>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn" onclick="window.location.href='screen5.html'" aria-label="Query log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <path d="M6 2h10l4 4v16a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1z"/>
      <path d="M16 2v4a1 1 0 001 1h4"/>
      <line x1="9" y1="9" x2="15" y2="9"/>
      <line x1="9" y1="12" x2="15" y2="12"/>
      <line x1="9" y1="15" x2="13" y2="15"/>
      <path d="M19 4l-4-4v3a1 1 0 001 1h3z" fill="currentColor" stroke="none" opacity="0.12"/>
    </svg>
  </button>
  <button class="nav-btn home" onclick="window.location.href='screen1.html'" aria-label="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <path d="M3 9.5l9-7 9 7"/>
      <path d="M5 10v9a1 1 0 001 1h12a1 1 0 001-1v-9"/>
    </svg>
  </button>
  <button class="nav-btn active" aria-label="Add server">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</nav>

<div class="page-label">Screen 4 · Add Server</div>

<script>
  function openScanner() { document.getElementById('scannerOverlay').classList.add('show'); }
  function closeScanner() { document.getElementById('scannerOverlay').classList.remove('show'); }
  function addFromLink() {
    const val = document.getElementById('linkInput').value.trim();
    if (!val) {
      document.getElementById('linkInput').style.borderColor = '#FF4D4D';
      setTimeout(() => { document.getElementById('linkInput').style.borderColor = ''; }, 1200);
      return;
    }
    window.location.href = 'screen2.html';
  }
</script>
</body>
</html>
