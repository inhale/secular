# .github/workflows/release.yml
# Secular CI/CD — builds Android on tag push with TrustTunnel native library

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin NDK version matching TrustTunnelClient's build.gradle.kts
  NDK_VERSION: "28.1.13356709"

jobs:

  # ── Stage 1: Build TrustTunnel native library ──────────────
  build-native:
    uses: ./.github/workflows/build-native-lib.yml

  # ── Stage 2: Build Android APK ─────────────────────────────
  build-android:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download native lib artifact
        uses: actions/download-artifact@v4
        with:
          name: trusttunnel-native-lib
          path: ./native-libs

      - name: Extract .so files into jniLibs
        run: |
          cd native-libs
          unzip -o trusttunnel-native-lib.zip -d ./extracted

          mkdir -p ../secular-android/app/src/main/jniLibs

          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            SRC="extracted/jni/$abi/libtrusttunnel_android.so"
            if [ -f "$SRC" ]; then
              mkdir -p "../secular-android/app/src/main/jniLibs/$abi"
              cp "$SRC" "../secular-android/app/src/main/jniLibs/$abi/"
              echo "✓ Installed libtrusttunnel_android.so for $abi ($(stat -c%s "$SRC") bytes)"
            else
              echo "✗ Missing libtrusttunnel_android.so for $abi"
            fi
          done

          echo "=== jniLibs ==="
          find ../secular-android/app/src/main/jniLibs -type f -exec ls -lh {} \;

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('secular-android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build Debug APK
        working-directory: ./secular-android
        run: |
          echo "=== JAVA_HOME: $JAVA_HOME ==="
          java -version 2>&1
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Find and copy APK
        run: |
          find secular-android -name "*.apk" 2>/dev/null | while read apk; do
            echo "APK: $apk ($(stat -c%s "$apk") bytes)"
            cp "$apk" /home/runner/work/secular/secular/
          done
          ls -la /home/runner/work/secular/secular/*.apk 2>/dev/null || echo "No APKs in workspace root"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-android
          path: |
            secular-android/app/build/outputs/apk/**/*.apk
            ./*.apk
          retention-days: 30

  # ── Stage 3: Create GitHub Release ─────────────────────────
  release:
    needs: build-android
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - run: find ./artifacts -type f | sort
      - name: Rename APK artifact
        run: |
          set -e
          for f in ./artifacts/secular-android/*.apk; do
            [ -f "$f" ] && cp "$f" "./secular-android-debug.apk" && echo "Renamed: $f → secular-android-debug.apk"
          done
          ls -la ./*.apk 2>/dev/null
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            secular-android-debug.apk
          generate_release_notes: true
          draft: false
          prerelease: false
