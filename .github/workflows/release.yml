# .github/workflows/release.yml
# Secular CI/CD — builds all platforms on tag push

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (macOS)
        shell: bash
        run: |
          set +e
          cd secular-desktop/src-tauri
          echo "=== Running tauri build ==="
          npx tauri build 2>&1
          echo "tauri build exit code: $?"
          BUNDLE_MACOS=""
          if [ -d "target/release/bundle/macos" ]; then
            BUNDLE_MACOS="target/release/bundle/macos"
          elif [ -d "target/aarch64-apple-darwin/release/bundle/macos" ]; then
            BUNDLE_MACOS="target/aarch64-apple-darwin/release/bundle/macos"
          fi
          if [ -n "$BUNDLE_MACOS" ]; then
            cd "$BUNDLE_MACOS"
            zip -rv ../../../secular-macos-aarch64.zip *.app
            cp ../../../secular-macos-aarch64.zip /Users/runner/work/secular/secular/secular-macos-aarch64.zip
          else
            echo "ERROR: No macOS bundle found"
            exit 1
          fi
        env:
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""

      - name: Upload macOS
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-macos
          path: secular-macos-aarch64.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (Windows)
        shell: bash
        run: |
          set +e
          cd secular-desktop/src-tauri
          echo "=== Running tauri build ==="
          npx tauri build 2>&1
          echo "tauri build exit code: $?"
          find target/release/bundle -type f 2>/dev/null | sort

      - name: Upload Windows
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-windows
          path: |
            secular-desktop/src-tauri/target/release/bundle/nsis/*.exe
            secular-desktop/src-tauri/target/release/secular-desktop.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev libwebkit2gtk-4.1-dev libfuse2
      - name: Install appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool && sudo mv /tmp/appimagetool /usr/local/bin/appimagetool
          appimagetool --version
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (Linux)
        shell: bash
        run: |
          set +e
          cd secular-desktop/src-tauri
          npx tauri build 2>&1
          echo "build exit code: $?"
          find target/release/bundle -type f 2>/dev/null | sort

      - name: Upload Linux
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-linux
          path: |
            secular-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            secular-desktop/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('secular-android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build Debug APK
        working-directory: ./secular-android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Copy APK to workspace
        run: |
          mkdir -p /home/runner/work/secular/secular
          find secular-android -name "*.apk" -exec cp {} /home/runner/work/secular/secular/ \;
          ls -la /home/runner/work/secular/secular/*.apk 2>/dev/null || echo "No APKs found"

      - name: Upload Android
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-android
          path: |
            secular-android/app/build/outputs/apk/**/*.apk
            ./*.apk
          retention-days: 30

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: xcodebuild -version

      - name: Prepare iOS project
        run: |
          cd secular-ios
          # Create a simple pbxproj-less build using xctoolchain
          # Since we have Swift sources but no .xcodeproj, generate one
          mkdir -p /tmp/ios-proj

          # Generate project.yml for xcodegen (avoids YAML-in-YAML issue)
          python3 << 'PYEOF'
          import yaml, os
          spec = {
            "options": {
              "bundleIdPrefix": "com.secular",
            },
            "targets": {
              "Secular": {
                "type": "application",
                "platform": "iOS",
                "deploymentTarget": "16.0",
                "sources": [{"path": "Secular"}],
                "settings": {
                  "base": {
                    "PRODUCT_BUNDLE_IDENTIFIER": "com.secular.vpn",
                    "INFOPLIST_FILE": "Secular/Info.plist",
                    "CODE_SIGN_IDENTITY": "",
                    "CODE_SIGNING_REQUIRED": "NO",
                    "CODE_SIGNING_ALLOWED": "NO",
                  }
                }
              }
            }
          }
          os.makedirs("secular-ios", exist_ok=True)
          with open("secular-ios/project.yml", "w") as f:
            yaml.dump(spec, f, default_flow_style=False, sort_keys=False)
          print("project.yml written")
          PYEOF

          cat project.yml

          # Try to install xcodegen
          brew install xcodegen 2>/dev/null || pip3 install xcodegen 2>/dev/null || echo "xcodegen not available"

          if command -v xcodegen &>/dev/null; then
            xcodegen generate
            ls -la *.xcodeproj 2>/dev/null && echo "Xcode project generated" || echo "Failed to generate"
          else
            echo "xcodegen not available, listing Swift files"
            find . -name "*.swift" | sort
          fi

      - name: Build iOS
        run: |
          cd secular-ios
          if [ -d "Secular.xcodeproj" ]; then
            xcodebuild \
              -project Secular.xcodeproj \
              -scheme Secular \
              -configuration Release \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              build 2>&1
            echo "BUILD_OK"
          else
            echo "NO_XCODEPROJ=1"
          fi

      - name: Package iOS
        run: |
          if [ -d ~/Library/Developer/Xcode/DerivedData ]; then
            APP=$(find ~/Library/Developer/Xcode/DerivedData -name "Secular.app" -type d 2>/dev/null | head -1)
            if [ -n "$APP" ]; then
              cd "$(dirname "$APP")"
              zip -ry /Users/runner/work/secular/secular/secular-ios.zip Secular.app
              echo "Packaged: secular-ios.zip"
            else
              echo "No .app found"
            fi
          fi

      - name: Upload iOS
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-ios
          path: /Users/runner/work/secular/secular/secular-ios.zip
          retention-days: 30

  release:
    needs: [build-macos, build-windows, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - run: find ./artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/secular-macos/**/*.zip
            artifacts/secular-windows/**/*.exe
            artifacts/secular-linux/**/*.AppImage
            artifacts/secular-linux/**/*.deb
            artifacts/secular-android/**/*.apk
            artifacts/secular-ios/**/*.zip
          generate_release_notes: true
          draft: true
          prerelease: true
