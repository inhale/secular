# .github/workflows/release.yml
# Secular CI/CD — builds Android on tag push with TrustTunnel native library

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-native:
    uses: ./.github/workflows/build-native-lib.yml

  build-android:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download native lib artifact
        uses: actions/download-artifact@v4
        with:
          name: trusttunnel-native-lib
          path: ./native-libs

      - name: Extract .so files into jniLibs
        run: |
          cd native-libs
          unzip -o trusttunnel-native-lib.zip -d ./extracted

          mkdir -p ../secular-android/app/src/main/jniLibs

          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            SRC="extracted/jni/$abi/libtrusttunnel_android.so"
            if [ -f "$SRC" ]; then
              mkdir -p "../secular-android/app/src/main/jniLibs/$abi"
              cp "$SRC" "../secular-android/app/src/main/jniLibs/$abi/"
              echo "✓ Installed libtrusttunnel_android.so for $abi ($(stat -c%s "$SRC") bytes)"
            else
              echo "✗ Missing libtrusttunnel_android.so for $abi"
            fi
          done

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('secular-android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build Debug APK
        working-directory: ./secular-android
        run: |
          java -version 2>&1
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Copy APK to workspace root
        run: |
          find secular-android -name "*.apk" 2>/dev/null | while read apk; do
            echo "APK: $apk ($(stat -c%s "$apk") bytes)"
            cp "$apk" /home/runner/work/secular/secular/
          done

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-android
          path: |
            secular-android/app/build/outputs/apk/**/*.apk
            ./*.apk
          retention-days: 30

  release:
    needs: build-android
    runs-on: ubuntu-latest
    if: needs.build-android.result == 'success'
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - run: find ./artifacts -type f -name "*.apk" | sort
      - name: Rename APK artifact
        run: |
          APK=$(find ./artifacts -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ./secular-android-debug.apk
            echo "Copied: $APK"
          else
            echo "No APK found"
            exit 1
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: secular-android-debug.apk
