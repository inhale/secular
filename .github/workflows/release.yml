# .github/workflows/release.yml
# Secular CI/CD — builds platform releases on tag push
# Tag patterns: v*-android → Android APK, v*-macos → macOS .dmg/.app

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Determine platform from tag
  # ──────────────────────────────────────────────
  detect:
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.detect.outputs.platform }}
    steps:
      - id: detect
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ "$TAG" == *-android ]]; then
            echo "platform=android" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *-macos ]]; then
            echo "platform=macos" >> "$GITHUB_OUTPUT"
          else
            echo "platform=unknown" >> "$GITHUB_OUTPUT"
          fi
          echo "Tag: $TAG → Platform: $(cat $GITHUB_OUTPUT | grep platform | cut -d= -f2)"

  # ──────────────────────────────────────────────
  # Android build (tag: v*-android)
  # ──────────────────────────────────────────────
  build-native:
    needs: detect
    if: needs.detect.outputs.platform == 'android'
    uses: ./.github/workflows/build-native-lib.yml

  build-android:
    needs: [detect, build-native]
    if: needs.detect.outputs.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download native lib artifact
        uses: actions/download-artifact@v4
        with:
          name: trusttunnel-native-lib
          path: ./native-libs

      - name: Extract .so files into jniLibs
        run: |
          cd native-libs
          unzip -o trusttunnel-native-lib.zip -d ./extracted

          mkdir -p ../secular-android/app/src/main/jniLibs

          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            SRC="extracted/jni/$abi/libtrusttunnel_android.so"
            if [ -f "$SRC" ]; then
              mkdir -p "../secular-android/app/src/main/jniLibs/$abi"
              cp "$SRC" "../secular-android/app/src/main/jniLibs/$abi/"
              echo "✓ Installed libtrusttunnel_android.so for $abi ($(stat -c%s "$SRC") bytes)"
            else
              echo "✗ Missing libtrusttunnel_android.so for $abi"
            fi
          done

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('secular-android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('secular-android/**/*.kt', 'secular-android/**/*.xml', 'secular-android/**/*.kts') }}

      - name: Decode release keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > secular-android/app/secular-release.jks

      - name: Build Release APK
        working-directory: ./secular-android
        env:
          KEYSTORE_FILE: secular-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          java -version 2>&1
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --no-build-cache --rerun-tasks 2>&1

      - name: Copy APK to workspace root
        run: |
          find secular-android -name "*.apk" 2>/dev/null | while read apk; do
            echo "APK: $apk ($(stat -c%s "$apk") bytes)"
            cp "$apk" /home/runner/work/secular/secular/
          done

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-android
          path: |
            secular-android/app/build/outputs/apk/**/*.apk
            ./*.apk
          retention-days: 30

  # ──────────────────────────────────────────────
  # macOS build (tag: v*-macos)
  # ──────────────────────────────────────────────
  build-macos:
    needs: detect
    if: needs.detect.outputs.platform == 'macos'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: ./secular-desktop
        run: npm ci

      - name: Build frontend
        working-directory: ./secular-desktop
        run: npm run build

      - name: Install Tauri CLI
        working-directory: ./secular-desktop
        run: npm install @tauri-apps/cli@2.11.2

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            secular-desktop/src-tauri/target
          key: macos-cargo-${{ hashFiles('secular-desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-cargo-

      - name: Build Tauri app (macOS ARM64 .app + .dmg)
        working-directory: ./secular-desktop
        run: npx tauri build --target aarch64-apple-darwin 2>&1

      - name: Build Tauri app (macOS x86_64 .app + .dmg)
        working-directory: ./secular-desktop
        run: npx tauri build --target x86_64-apple-darwin 2>&1

      - name: List build outputs
        run: |
          echo "=== Bundle outputs ==="
          find secular-desktop/src-tauri/target -path "*/bundle/*" -type f \( -name "*.dmg" -o -name "*.app" \) 2>/dev/null | while read f; do
            echo "  $f ($(stat -f%z "$f" 2>/dev/null || stat -c%s "$f" 2>/dev/null) bytes)"
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secular-macos
          path: |
            secular-desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
            secular-desktop/src-tauri/target/*/release/bundle/macos/*.app
          retention-days: 30

  # ──────────────────────────────────────────────
  # Release: publish artifacts to GitHub Release
  # ──────────────────────────────────────────────
  release-android:
    needs: [detect, build-android]
    if: needs.detect.outputs.platform == 'android'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: secular-android
          path: ./artifacts
      - run: find ./artifacts -type f -name "*.apk" | sort
      - name: Rename APK artifact
        run: |
          APK=$(find ./artifacts -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ./secular-android-release.apk
            echo "Copied: $APK"
          else
            echo "No APK found"
            exit 1
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: secular-android-release.apk

  release-macos:
    needs: [detect, build-macos]
    if: needs.detect.outputs.platform == 'macos'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: secular-macos
          path: ./artifacts
      - run: find ./artifacts -type f \( -name "*.dmg" -o -name "*.app" \) | sort
      - name: Rename artifacts
        run: |
          DMG=$(find ./artifacts -name "*.dmg" -type f | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" ./Secular.dmg
            echo "DMG: $DMG"
          fi
          APP=$(find ./artifacts -name "*.app" -type f | head -1)
          if [ -n "$APP" ]; then
            # .app is a directory, zip it
            cd artifacts
            zip -r ../Secular-macos.zip "$(basename "$APP")"
            cd ..
            echo "APP: $APP"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            Secular.dmg
            Secular-macos.zip
