# Secular CI/CD — builds platform releases on tag push
#
# Tag patterns:
#   v*              → Build both macOS and Android, create unified release
#   v*-macos        → macOS only (.dmg)
#   v*-android      → Android only (.apk)
#
# Versioning: simple semver (v1.0.0, v1.1.0, v2.0.0 etc)
# Each release publishes the latest stable artifacts for that platform.
# Old release assets are kept but untagged releases are cleaned up.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect platform from tag ──
  detect:
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.detect.outputs.platform }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - id: detect
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG%%-*}"
          if [[ "$TAG" == *-android ]]; then
            PLATFORM="android"
          elif [[ "$TAG" == *-macos ]]; then
            PLATFORM="macos"
          else
            PLATFORM="both"
          fi
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG → Version: $VERSION → Platform: $PLATFORM"

  # ── Android build (tag: v*-android or v*) ──
  build-native:
    needs: detect
    if: needs.detect.outputs.platform == 'android' || needs.detect.outputs.platform == 'both'
    uses: ./.github/workflows/build-native-lib.yml

  build-android:
    needs: [detect, build-native]
    if: needs.detect.outputs.platform == 'android' || needs.detect.outputs.platform == 'both'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download native lib artifact
        uses: actions/download-artifact@v4
        with:
          name: trusttunnel-native-lib
          path: ./native-libs

      - name: Extract .so files into jniLibs
        run: |
          cd native-libs
          unzip -o trusttunnel-native-lib.zip -d ./extracted
          mkdir -p ../secular-android/app/src/main/jniLibs
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            SRC="extracted/jni/$abi/libtrusttunnel_android.so"
            if [ -f "$SRC" ]; then
              mkdir -p "../secular-android/app/src/main/jniLibs/$abi"
              cp "$SRC" "../secular-android/app/src/main/jniLibs/$abi/"
              echo "✓ $abi ($(stat -c%s "$SRC") bytes)"
            else
              echo "✗ Missing $abi"
            fi
          done

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('secular-android/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('secular-android/**/*.kt', 'secular-android/**/*.xml', 'secular-android/**/*.kts') }}

      - name: Decode release keystore
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > secular-android/app/secular-release.jks

      - name: Build Release APK
        working-directory: ./secular-android
        env:
          KEYSTORE_FILE: secular-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-android
          path: secular-android/app/build/outputs/apk/release/*.apk
          retention-days: 90

  # ── macOS build (tag: v*-macos or v*) ──
  build-macos:
    needs: detect
    if: needs.detect.outputs.platform == 'macos' || needs.detect.outputs.platform == 'both'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            secular-desktop/src-tauri/target
          key: macos-cargo-${{ hashFiles('secular-desktop/src-tauri/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            macos-cargo-${{ hashFiles('secular-desktop/src-tauri/Cargo.lock') }}

      - name: Install dependencies + Tauri CLI
        working-directory: ./secular-desktop
        run: |
          npm ci
          npm install @tauri-apps/cli@2.11.2

      - name: Build Tauri app (macOS ARM64)
        working-directory: ./secular-desktop
        run: |
          rustup target add x86_64-apple-darwin
          npx tauri build --target aarch64-apple-darwin 2>&1

      - name: Build Tauri app (macOS x86_64)
        working-directory: ./secular-desktop
        run: npx tauri build --target x86_64-apple-darwin 2>&1

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secular-macos
          path: |
            secular-desktop/src-tauri/target/*/release/bundle/dmg/*.dmg
          retention-days: 90

  # ── Publish release ──
  release:
    needs: [detect, build-android, build-macos]
    if: |
      always() &&
      !cancelled() &&
      (needs.build-android.result == 'success' || needs.build-macos.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: find ./artifacts -type f | sort

      - name: Prepare release files
        run: |
          mkdir -p ./release
          # Upload all APKs
          while IFS= read -r f; do
            [ -n "$f" ] && cp "$f" "./release/$(basename "$f")"
          done < <(find ./artifacts -name "*.apk" -type f)
          # Upload all DMGs (ARM + x86_64)
          while IFS= read -r f; do
            [ -n "$f" ] && cp "$f" "./release/$(basename "$f")"
          done < <(find ./artifacts -name "*.dmg" -type f)
          echo "Files prepared:"
          ls -la ./release/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ needs.detect.outputs.version }}
          files: ./release/*
          fail_on_unmatched_files: false
          generate_release_notes: true
