# .github/workflows/release.yml
# Secular CI/CD — builds all platforms on tag push
# Desktop: macOS (DMG universal2), Windows (MSI), Linux (AppImage)
# Mobile: iOS (IPA), Android (APK)

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Cancel in-progress runs for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────
  # DESKTOP: macOS universal2 (aarch64 + x86_64)
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: ./secular-desktop
        run: npm ci

      - name: Build secular-core (universal2)
        working-directory: ./secular-core
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/universal
          lipo -create \
            target/aarch64-apple-darwin/release/libsecular_core.a \
            target/x86_64-apple-darwin/release/libsecular_core.a \
            -output target/universal/libsecular_core.a
          echo "Universal lib:"
          file target/universal/libsecular_core.a

      - name: Build Tauri desktop app (macOS universal2)
        working-directory: ./secular-desktop
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          RUSTFLAGS: "-L ../secular-core/target/universal"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-macos-dmg
          path: secular-desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 30

  # ──────────────────────────────────────────────
  # DESKTOP: Windows MSI
  # ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: ./secular-desktop
        run: npm ci

      - name: Build secular-core
        working-directory: ./secular-core
        run: cargo build --release

      - name: Build Tauri desktop app (Windows)
        working-directory: ./secular-desktop
        run: npm run tauri build
        env:
          RUSTFLAGS: "-L ../secular-core/target/release"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-windows-msi
          path: secular-desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-windows-nsis
          path: secular-desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  # ──────────────────────────────────────────────
  # DESKTOP: Linux AppImage
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: ./secular-desktop
        run: npm ci

      - name: Build secular-core
        working-directory: ./secular-core
        run: cargo build --release

      - name: Build Tauri desktop app (Linux)
        working-directory: ./secular-desktop
        run: npm run tauri build

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-linux-appimage
          path: secular-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-linux-deb
          path: secular-desktop/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30

  # ──────────────────────────────────────────────
  # MOBILE: iOS IPA (requires macOS runner + Xcode)
  # ──────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    needs: [build-macos]  # reuse the same runner type, sequential to save minutes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: ./secular-desktop
        run: npm ci

      - name: Install Tauri CLI mobile support
        run: cargo install tauri-cli --version "^2" --locked || true

      - name: Build secular-core (iOS)
        working-directory: ./secular-core
        run: |
          cargo build --release --target aarch64-apple-ios
          cargo build --release --target aarch64-apple-ios-sim
          mkdir -p target/ios-universal
          lipo -create \
            target/aarch64-apple-ios/release/libsecular_core.a \
            target/aarch64-apple-ios-sim/release/libsecular_core.a \
            -output target/ios-universal/libsecular_core.a
          echo "iOS Universal lib:"
          file target/ios-universal/libsecular_core.a

      - name: Build Tauri iOS app
        working-directory: ./secular-desktop
        run: |
          npx tauri ios init || true
          npx tauri ios build --debug
        env:
          RUSTFLAGS: "-L ../secular-core/target/aarch64-apple-ios/release"
          IOS_BUNDLE_ID: "com.secular.vpn"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-ios-app
          path: |
            secular-desktop/src-tauri/gen/iphoneos/Build/Products/**/*.app
            secular-desktop/src-tauri/target/aarch64-apple-ios/release/bundle/**/*.ipa
          retention-days: 30

  # ──────────────────────────────────────────────
  # MOBILE: Android APK (Linux runner + NDK)
  # ──────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: [build-linux]  # sequential to save runner minutes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: ./secular-desktop
        run: npm ci

      - name: Build secular-core (Android targets)
        working-directory: ./secular-core
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
        run: |
          # Set up standalone NDK toolchains for cargo
          export TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          
          # aarch64-linux-android
          export CC_aarch64_linux_android="$TOOLCHAIN/bin/aarch64-linux-android34-clang"
          export AR_aarch64_linux_android="$TOOLCHAIN/bin/llvm-ar"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$TOOLCHAIN/bin/aarch64-linux-android34-clang"
          cargo build --release --target aarch64-linux-android
          
          # armv7-linux-androideabi
          export CC_armv7_linux_androideabi="$TOOLCHAIN/bin/armv7a-linux-androideabi34-clang"
          export AR_armv7_linux_androideabi="$TOOLCHAIN/bin/llvm-ar"
          export CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER="$TOOLCHAIN/bin/armv7a-linux-androideabi34-clang"
          cargo build --release --target armv7-linux-androideabi
          
          echo "Android builds complete"
          ls -la target/*/release/libsecular_core.a

      - name: Initialize Tauri Android
        working-directory: ./secular-desktop
        run: |
          npx tauri android init || true
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Build Tauri Android debug APK
        working-directory: ./secular-desktop
        run: npx tauri android build --debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-android-apk
          path: |
            secular-desktop/src-tauri/gen/android/**/outputs/**/*.apk
            secular-desktop/src-tauri/target/**/apk/**/*.apk
          retention-days: 30

  # ──────────────────────────────────────────────
  # RELEASE: Collect all artifacts, create GitHub Release
  # ──────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-linux, build-ios, build-android]
    runs-on: ubuntu-latest
    if: always()  # Run even if mobile jobs fail (they need Apple/Google signing)
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded artifacts
        run: find ./artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            secular-macos-dmg/*.dmg
            secular-windows-msi/*.msi
            secular-windows-nsis/*.exe
            secular-linux-appimage/*.AppImage
            secular-linux-deb/*.deb
            secular-ios-app/** /*
            secular-android-apk/** /*
          generate_release_notes: true
          draft: false
          prerelease: false
