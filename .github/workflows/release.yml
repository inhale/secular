# .github/workflows/release.yml
# Secular CI/CD — builds all platforms on tag push
# Desktop: macOS (DMG universal2), Windows (MSI), Linux (AppImage)
# Mobile: iOS (IPA), Android (APK)

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ──────────────────────────────────────────────
  # DESKTOP: macOS universal2 (aarch64 + x86_64)
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: ./secular-desktop
        run: npm install

      - name: Build Tauri app (macOS universal2)
        working-directory: ./secular-desktop
        run: npx tauri build -- --target universal-apple-darwin

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-macos-dmg
          path: secular-desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 30

  # ──────────────────────────────────────────────
  # DESKTOP: Windows MSI
  # ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: ./secular-desktop
        run: npm install

      - name: Build Tauri app (Windows)
        working-directory: ./secular-desktop
        run: npx tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-windows-msi
          path: secular-desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-windows-nsis
          path: secular-desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  # ──────────────────────────────────────────────
  # DESKTOP: Linux AppImage
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: ./secular-desktop
        run: npm install

      - name: Build Tauri app (Linux)
        working-directory: ./secular-desktop
        run: npx tauri build

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-linux-appimage
          path: secular-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-linux-deb
          path: secular-desktop/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30

  # ──────────────────────────────────────────────
  # MOBILE: iOS
  # ──────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    needs: [build-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: ./secular-desktop
        run: npm install

      - name: Build Tauri iOS app
        working-directory: ./secular-desktop
        run: npx tauri ios build
        env:
          IOS_BUNDLE_ID: "com.secular.vpn"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-ios-app
          path: secular-desktop/src-tauri/target/**/ipa/*.ipa
          retention-days: 30

  # ──────────────────────────────────────────────
  # MOBILE: Android
  # ──────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;27.0.12077973"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: ./secular-desktop
        run: npm install

      - name: Build Tauri Android APK
        working-directory: ./secular-desktop
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}
        run: npx tauri android build --debug

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: secular-android-apk
          path: secular-desktop/src-tauri/target/**/apk/**/*.apk
          retention-days: 30

  # ──────────────────────────────────────────────
  # RELEASE: Collect all artifacts, create GitHub Release
  # ──────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-linux, build-ios, build-android]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List downloaded artifacts
        run: find ./artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            secular-macos-dmg/*.dmg
            secular-windows-msi/*.msi
            secular-windows-nsis/*.exe
            secular-linux-appimage/*.AppImage
            secular-linux-deb/*.deb
            secular-ios-app/**/*
            secular-android-apk/**/*
          generate_release_notes: true
          draft: false
          prerelease: false
