# .github/workflows/release.yml
# Secular CI/CD — builds all platforms on tag push

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:

  # ──────────────────────────────────────────────
  # macOS: .app bundle → zip
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (macOS)
        shell: bash
        run: |
          set +e
          cd secular-desktop/src-tauri

          echo "=== Running tauri build ==="
          npx tauri build 2>&1
          BUILD_EXIT=$?
          echo "tauri build exit code: $BUILD_EXIT"

          echo "=== Post-build debug ==="
          find target -maxdepth 4 -type f \( -name "*.app" -o -name "secular-desktop" \) 2>/dev/null
          find target -maxdepth 3 -type d 2>/dev/null | sort

          echo "=== Zipping ==="
          BUNDLE_MACOS=""
          if [ -d "target/release/bundle/macos" ]; then
            BUNDLE_MACOS="target/release/bundle/macos"
          elif [ -d "target/aarch64-apple-darwin/release/bundle/macos" ]; then
            BUNDLE_MACOS="target/aarch64-apple-darwin/release/bundle/macos"
          fi
          if [ -n "$BUNDLE_MACOS" ]; then
            cd "$BUNDLE_MACOS"
            ls -la *.app
            zip -rv ../../../secular-macos-aarch64.zip *.app
            cp ../../../secular-macos-aarch64.zip /Users/runner/work/secular/secular/secular-macos-aarch64.zip 2>/dev/null || true
          else
            echo "ERROR: No macOS bundle directory found"
            exit 1
          fi
        env:
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""

      - name: Upload macOS App
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-macos
          path: secular-macos-aarch64.zip
          retention-days: 30

  # ──────────────────────────────────────────────
  # Windows: NSIS installer
  # ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (Windows)
        shell: bash
        run: |
          set +e
          cd secular-desktop/src-tauri

          echo "=== Running tauri build ==="
          npx tauri build 2>&1
          BUILD_EXIT=$?
          echo "tauri build exit code: $BUILD_EXIT"

          echo "=== Checking bundle output ==="
          find target/release/bundle -type f 2>/dev/null | sort
          ls -la target/release/secular-desktop.exe 2>/dev/null || echo "No .exe found"

      - name: Upload Windows Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-windows
          path: |
            secular-desktop/src-tauri/target/release/bundle/nsis/*.exe
            secular-desktop/src-tauri/target/release/secular-desktop.exe
          retention-days: 30

  # ──────────────────────────────────────────────
  # Linux: .deb + .AppImage
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev libwebkit2gtk-4.1-dev \
            libfuse2

      - name: Install appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool
          appimagetool --version

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (Linux)
        shell: bash
        run: |
          set +e
          cd secular-desktop/src-tauri

          echo "=== Running tauri build ==="
          npx tauri build 2>&1
          BUILD_EXIT=$?
          echo "tauri build exit code: $BUILD_EXIT"

          echo "=== Checking bundle output ==="
          find target/release/bundle -type f 2>/dev/null | sort || echo "No bundle output"
          ls -la target/release/bundle/deb/*.deb 2>/dev/null || echo "No .deb found"
          ls -la target/release/bundle/appimage/*.AppImage 2>/dev/null || echo "No .AppImage found"

      - name: Upload Linux Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-linux
          path: |
            secular-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            secular-desktop/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30

  # ──────────────────────────────────────────────
  # Android: Debug APK
  # ──────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('secular-android/**/*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Gradle wrapper
        working-directory: ./secular-android
        run: |
          # Download gradle wrapper if not present
          if [ ! -f gradlew ]; then
            echo "=== Downloading gradle wrapper ==="
            # Get gradle version from wrapper properties
            GRADLE_VERSION=$(grep distributionUrl gradle/wrapper/gradle-wrapper.properties 2>/dev/null | sed 's/.*gradle-\(.*\)-.*/\1/' || echo "8.2")
            echo "Gradle version: $GRADLE_VERSION"
            # Install gradle temporarily
            curl -sL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
            unzip -q -o /tmp/gradle.zip -d /tmp/
            export PATH="/tmp/gradle-${GRADLE_VERSION}/bin:$PATH"
            gradle wrapper --no-daemon
          fi
          chmod +x gradlew
          ls -la gradlew

      - name: Build Debug APK
        working-directory: ./secular-android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find and copy APK
        run: |
          echo "=== Looking for APK ==="
          find secular-android -name "*.apk" 2>/dev/null | sort

          # Copy APKs to workspace root for reliable artifact upload
          for apk in $(find secular-android -name "*.apk" 2>/dev/null); do
            echo "Found: $apk ($(stat -c%s "$apk" 2>/dev/null || stat -f%z "$apk" 2>/dev/null) bytes)"
            cp "$apk" /home/runner/work/secular/secular/ 2>/dev/null || true
          done
          echo "=== Workspace root APKs ==="
          ls -la /home/runner/work/secular/secular/*.apk 2>/dev/null || echo "No APKs in workspace root"

      - name: Upload Android APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-android
          path: |
            secular-android/app/build/outputs/apk/**/*.apk
            ./*.apk
          retention-days: 30

  # ──────────────────────────────────────────────
  # iOS: Build .app bundle → zip (unsigned)
  # ──────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          xcodebuild -version
          xcodebuild -showsdks 2>&1 | grep -i ios

      - name: Find Xcode project
        run: |
          find secular-ios -name "*.xcodeproj" -o -name "*.xcworkspace" | sort
          ls -la secular-ios/

      - name: Build iOS (Swift Package)
        working-directory: ./secular-ios
        run: |
          ls -la

          # Check if we have an xcodeproj or need to use swift package
          if [ -d "Secular.xcodeproj" ] || [ -d "Secular.xcworkspace" ]; then
            echo "=== Building with xcodebuild ==="
            SCHEME="Secular"
            # Try xcodebuild on the Secular directory
            xcodebuild \
              -scheme "$SCHEME" \
              -configuration Release \
              -sdk iphoneos \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              build 2>&1 || BUILD_FAILED=1
          else
            echo "=== No xcodeproj found, checking Package.swift ==="
            if [ -f "Package.swift" ]; then
              echo "Building with Swift Package Manager..."
              swift build 2>&1 || BUILD_FAILED=1
            else
              echo "=== No Package.swift either, listing contents ==="
              ls -la
              find . -name "*.swift" | sort
              BUILD_FAILED=1
            fi
          fi

          if [ "$BUILD_FAILED" = "1" ]; then
            echo "=== Build attempt finished (check output above) ==="
          fi

      - name: Package iOS App
        run: |
          echo "=== Looking for built .app ==="

          # Search in DerivedData
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Secular.app" -type d 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            # Search relative to project
            APP_PATH=$(find secular-ios -name "*.app" -type d 2>/dev/null | head -1)
          fi

          if [ -n "$APP_PATH" ]; then
            echo "Found app at: $APP_PATH"
            DIR=$(dirname "$APP_PATH")
            cd "$DIR"
            zip -r "/Users/runner/work/secular/secular/secular-ios.zip" "Secular.app"
            ls -la /Users/runner/work/secular/secular/secular-ios.zip
          else
            echo "WARNING: No .app bundle found — build may have failed"
            # Don't fail the job so the workflow continues
            echo "Creating placeholder zip"
            echo "iOS build requires Apple Developer signing for distribution" > /tmp/ios-notice.txt
            cd /tmp && zip /Users/runner/work/secular/secular/ios-ios.zip ios-notice.txt
          fi

      - name: Upload iOS App
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-ios
          path: |
            secular-ios/**/*.zip
            /Users/runner/work/secular/secular/secular-ios.zip
          retention-days: 30

  # ──────────────────────────────────────────────
  # Release: collect all artifacts, create GitHub Release
  # ──────────────────────────────────────────────
  release:
    needs: [build-macos, build-windows, build-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: find ./artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/secular-macos/**/*.zip
            artifacts/secular-windows/**/*.exe
            artifacts/secular-linux/**/*.AppImage
            artifacts/secular-linux/**/*.deb
            artifacts/secular-android/**/*.apk
            artifacts/secular-ios/**/*.zip
          generate_release_notes: true
          draft: true
          prerelease: true
