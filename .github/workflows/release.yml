# .github/workflows/release.yml
# Secular CI/CD — builds all platforms on tag push

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (macOS)
        shell: bash
        run: |
          set +e
          cd secular-desktop/src-tauri

          echo "=== Running tauri build ==="
          npx tauri build 2>&1
          BUILD_EXIT=$?
          echo "tauri build exit code: $BUILD_EXIT"

          echo "=== Post-build debug ==="
          find target -maxdepth 4 -type f \( -name "*.app" -o -name "secular-desktop" \) 2>/dev/null
          find target -maxdepth 3 -type d 2>/dev/null | sort

          echo "=== Zipping ==="
          BUNDLE_MACOS=""
          if [ -d "target/release/bundle/macos" ]; then
            BUNDLE_MACOS="target/release/bundle/macos"
          elif [ -d "target/aarch64-apple-darwin/release/bundle/macos" ]; then
            BUNDLE_MACOS="target/aarch64-apple-darwin/release/bundle/macos"
          fi
          if [ -n "$BUNDLE_MACOS" ]; then
            cd "$BUNDLE_MACOS"
            ls -la *.app
            zip -rv ../../../secular-macos-aarch64.zip *.app
            ls -la ../../../secular-macos-aarch64.zip
            # Also copy to workspace root for reliable artifact upload
            cp ../../../secular-macos-aarch64.zip /Users/runner/work/secular/secular/secular-macos-aarch64.zip 2>/dev/null || true
          else
            echo "ERROR: No macOS bundle directory found"
            exit 1
          fi
        env:
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""

      - name: Upload macOS App
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-macos
          path: secular-macos-aarch64.zip
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (Windows)
        shell: bash
        run: |
          set +e
          cd secular-desktop/src-tauri
          npx tauri build 2>&1
          BUILD_EXIT=$?
          echo "tauri build exit code: $BUILD_EXIT"
          echo "=== Checking output ==="
          find target/release/bundle -type f 2>/dev/null | sort
          ls -la target/release/secular-desktop.exe 2>/dev/null || echo "No .exe found"

      - name: Upload Windows Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-windows
          path: |
            secular-desktop/src-tauri/target/release/bundle/msi/*.msi
            secular-desktop/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev libwebkit2gtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (Linux)
        shell: bash
        run: |
          set +e
          cd secular-desktop/src-tauri
          npx tauri build 2>&1
          BUILD_EXIT=$?
          echo "tauri build exit code: $BUILD_EXIT"
          echo "=== Checking bundle output ==="
          find target/release/bundle -type f 2>/dev/null | sort || echo "No bundle output"
          # Also check for .deb package
          ls -la target/release/bundle/deb/*.deb 2>/dev/null || echo "No .deb found"
          ls -la target/release/bundle/appimage/*.AppImage 2>/dev/null || echo "No .AppImage found"

      - name: Upload Linux Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secular-linux
          path: |
            secular-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            secular-desktop/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: find ./artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/secular-macos/*.zip
            artifacts/secular-windows/*.msi
            artifacts/secular-windows/*.exe
            artifacts/secular-linux/*.AppImage
            artifacts/secular-linux/*.deb
          generate_release_notes: true
          prerelease: true
