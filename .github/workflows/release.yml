# .github/workflows/release.yml
# Secular CI/CD — builds all platforms on tag push

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (macOS aarch64)
        run: |
          cd secular-desktop/src-tauri
          npx tauri build -- --target aarch64-apple-darwin
        env:
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: secular-macos
          path: secular-desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (Windows)
        run: |
          cd secular-desktop/src-tauri
          npx tauri build

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: secular-windows-msi
          path: secular-desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev libwebkit2gtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./secular-desktop

      - name: Build Tauri (Linux)
        run: |
          cd secular-desktop/src-tauri
          npx tauri build

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: secular-linux-appimage
          path: secular-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: List artifacts
        run: find ./artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            secular-macos/**/*
            secular-windows-msi/*.msi
            secular-linux-appimage/*.AppImage
          generate_release_notes: true
          prerelease: true
