# .github/workflows/build-native-lib.yml
# Builds TrustTunnel native Android library (libtrusttunnel_android.so) from source.
# All Conan dependencies are bootstrapped from public AdGuard repos.
# Artifact: trusttunnel-native-lib.zip containing .so files for all 4 ABIs.

name: Build Native Library

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-native:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build
          pip3 install conan
          cmake --version
          conan --version

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 28.1.13356709
        timeout-minutes: 15
        run: |
          # Auto-accept licenses and install NDK
          yes | sdkmanager --install "ndk;28.1.13356709" 2>&1 || true

          # Locate NDK (varies by SDK install path)
          for base in "$ANDROID_HOME" "$ANDROID_SDK_ROOT" /usr/local/lib/android/sdk; do
            if [ -n "$base" ] && [ -d "$base/ndk/28.1.13356709" ] && [ -f "$base/ndk/28.1.13356709/ndk-build" ]; then
              echo "NDK_DIR=$base/ndk/28.1.13356709" >> "$GITHUB_ENV"
              echo "Found NDK at $base/ndk/28.1.13356709"
              exit 0
            fi
          done

          echo "ERROR: NDK 28.1.13356709 not found"
          ls "$ANDROID_HOME/ndk/" 2>/dev/null || echo "No ndk dir in ANDROID_HOME"
          exit 1

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/
          key: conan2-${{ runner.os }}-${{ hashFiles('tt-client/conanfile.py') }}-${{ github.run_id }}
          restore-keys: conan2-${{ runner.os }}-${{ hashFiles('tt-client/conanfile.py') }}

      - name: Clone TrustTunnelClient
        run: |
          git clone --depth 50 --no-single-branch https://github.com/TrustTunnel/TrustTunnelClient.git tt-client
          echo "HEAD: $(cd tt-client && git rev-parse HEAD)"

      - name: Fix Conan version mismatch
        run: |
          cd tt-client
          # TrustTunnelClient's conanfile.py specifies dns-libs/2.8.51 but DnsLibs latest is 2.8.52
          # Patch to use available version
          sed -i 's|self.requires("dns-libs/2.8.51|self.requires("dns-libs/2.8.52|' conanfile.py
          echo "=== Patched conanfile.py ==="
          grep -n "dns-libs\|native_libs_common" conanfile.py

      - name: Bootstrap Conan dependencies
        working-directory: tt-client
        timeout-minutes: 30
        run: |
          # Parse the required version from our patched conanfile.py
          DNS_VERSION=$(grep -oP 'self\.requires\("dns-libs/\K[0-9.]+' conanfile.py | head -1)
          NLC_VERSION=$(grep -oP 'self\.requires\("native_libs_common/\K[0-9.]+' conanfile.py | head -1)
          echo "DnsLibs version: $DNS_VERSION"
          echo "NativeLibsCommon version: $NLC_VERSION"

          # Clone DnsLibs (full so we can checkout any tag)
          git clone https://github.com/AdguardTeam/DnsLibs.git dns-libs-tmp
          cd dns-libs-tmp
          # Find the closest tag
          git tag -l "v${DNS_VERSION%.*}*" | tail -5
          # Export using local version (uses git commit hash, avoids tag checkout issue)
          python3 scripts/export_conan.py local 2>&1 | tail -5
          cd ..

          # Clone NativeLibsCommon (full so we can checkout any tag)
          git clone https://github.com/AdguardTeam/NativeLibsCommon.git nlc-tmp
          cd nlc-tmp
          git checkout "v${NLC_VERSION}" 2>&1 || (echo "Tag not found, using master" && git checkout master)
          python3 scripts/export_conan.py "$NLC_VERSION" 2>&1 | tail -5
          # Also export all recipes (boringssl, openssl, quiche, etc.)
          for recipe in conan/recipes/*/; do
            if [ -d "$recipe" ]; then
              conan export "$recipe" --user adguard --channel oss 2>&1 | tail -2
            fi
          done
          cd ..

          echo "=== Conan cache ==="
          ls ~/.conan2/p/ 2>/dev/null | sort | head -30

      - name: Build native library (AAR)
        working-directory: tt-client/platform/android
        timeout-minutes: 30
        run: |
          # Write local.properties
          echo "cmake.dir=$(dirname $(dirname $(which cmake)))" > local.properties
          echo "ndk.dir=$NDK_DIR" >> local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          cat local.properties

          chmod +x gradlew

          # Build AAR with all 4 ABIs
          ./gradlew :lib:assembleRelease --no-daemon 2>&1 | tee /tmp/build.log

          echo "=== Build output ==="
          find lib/build -name "*.aar" -type f 2>/dev/null
          find lib/build -name "libtrusttunnel_android.so" -type f 2>/dev/null

      - name: Extract .so files from AAR
        working-directory: tt-client/platform/android
        run: |
          AAR=$(find lib/build -name "*.aar" -type f | head -1)
          if [ -z "$AAR" ]; then
            echo "ERROR: No AAR produced"
            echo "=== lib/build contents ==="
            find lib/build -type f | head -30
            exit 1
          fi

          echo "AAR: $AAR ($(stat -c%s "$AAR" 2>/dev/null || stat -f%z "$AAR") bytes)"

          rm -rf /tmp/native-libs-extracted
          mkdir -p /tmp/native-libs-extracted
          unzip -o "$AAR" -d /tmp/native-libs-extracted

          echo "=== Extracted ==="
          find /tmp/native-libs-extracted -name "*.so" -type f | while read f; do
            echo "  $f ($(stat -c%s "$f" 2>/dev/null || stat -f%z "$f") bytes)"
          done

          zip -j /tmp/trusttunnel-native-lib.zip $(find /tmp/native-libs-extracted -name "*.so" -type f)
          ls -la /tmp/trusttunnel-native-lib.zip

      - name: Upload native lib artifact
        uses: actions/upload-artifact@v4
        with:
          name: trusttunnel-native-lib
          path: /tmp/trusttunnel-native-lib.zip
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-logs
          path: /tmp/build.log
          retention-days: 5
