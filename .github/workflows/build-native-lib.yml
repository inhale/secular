# .github/workflows/build-native-lib.yml
# Builds TrustTunnel native Android library (libtrusttunnel_android.so) from source.
# All Conan dependencies are bootstrapped from public AdGuard repos.
# Artifact: trusttunnel-native-lib.zip containing .so files for all 4 ABIs.

name: Build Native Library

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-native:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ninja-build
          pip3 install conan
          cmake --version
          conan --version
          # Ensure conan default profile exists
          conan profile detect --force 2>&1 || true
          conan profile list 2>&1 || true

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 28.1.13356709
        timeout-minutes: 15
        run: |
          yes | sdkmanager --install "ndk;28.1.13356709" 2>&1 || true
          for base in "$ANDROID_HOME" "$ANDROID_SDK_ROOT" /usr/local/lib/android/sdk; do
            if [ -n "$base" ] && [ -d "$base/ndk/28.1.13356709" ] && [ -f "$base/ndk/28.1.13356709/ndk-build" ]; then
              echo "NDK_DIR=$base/ndk/28.1.13356709" >> "$GITHUB_ENV"
              echo "Found NDK: $NDK_DIR"
              exit 0
            fi
          done
          echo "ERROR: NDK not found"; exit 1

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/
          key: conan2-${{ runner.os }}-ndk28-v1-${{ github.run_id }}
          restore-keys: conan2-${{ runner.os }}-ndk28-v1-

      - name: Clone TrustTunnelClient
        run: |
          git clone --depth 1 https://github.com/TrustTunnel/TrustTunnelClient.git tt-client
          echo "tt-client: $(cd tt-client && git rev-parse HEAD)"

      - name: Bootstrap Conan dependencies
        working-directory: tt-client
        timeout-minutes: 30
        run: |
          # The TrustTunnelClient conanfile.py requires:
          #   dns-libs/2.8.51@adguard/oss  (latest tag is v2.8.52)
          #   native_libs_common/8.1.28@adguard/oss

          # ── DnsLibs ──
          git clone --depth 1 https://github.com/AdguardTeam/DnsLibs.git ../dns-libs
          # Find latest 2.8.x tag
          DNS_TAG=$(cd ../dns-libs && git tag -l "v2.8.*" | sort -V | tail -1)
          DNS_VERSION=${DNS_TAG#v}
          echo "DnsLibs: using tag $DNS_TAG (version $DNS_VERSION)"
          cd ../dns-libs && git checkout "$DNS_TAG" 2>&1
          # Also read nested native_libs_common version from DnsLibs's conanfile
          DNS_NLC_REQ=$(grep -oP 'self\.requires\("native_libs_common/\K[0-9.]+' conanfile.py | head -1)
          echo "DnsLibs requires native_libs_common/$DNS_NLC_REQ"
          python3 scripts/export_conan.py "$DNS_VERSION" 2>&1 | tail -3
          cd ../tt-client

          # ── NativeLibsCommon ──
          git clone --depth 1 https://github.com/AdguardTeam/NativeLibsCommon.git ../nlc
          # Use the version required by TrustTunnelClient (not DnsLibs's requirement)
          NLC_VERSION="8.1.28"
          cd ../nlc && git checkout "v${NLC_VERSION}" 2>&1
          python3 scripts/export_conan.py "$NLC_VERSION" 2>&1 | tail -3
          # Export all dependency recipes (boringssl, openssl, quiche, nghttp2, etc.)
          for recipe in conan/recipes/*/; do
            [ -d "$recipe" ] && conan export "$recipe" --user adguard --channel oss 2>&1 | tail -1
          done
          cd ../tt-client

          # ── Patch conanfile.py to use versions we actually have ──
          sed -i "s|self.requires(\"dns-libs/2.8.51|self.requires(\"dns-libs/${DNS_VERSION}|" conanfile.py
          echo "=== Patched conanfile.py ==="
          grep -n "dns-libs\|native_libs_common" conanfile.py

          # ── Verify Conan can find packages ──
          echo "=== Conan cache ==="
          conan list "dns-libs/*@adguard/oss" 2>&1 || true
          conan list "native_libs_common/*@adguard/oss" 2>&1 || true

      - name: Build native library (AAR)
        working-directory: tt-client/platform/android
        timeout-minutes: 30
        run: |
          echo "cmake.dir=$(dirname $(dirname $(which cmake)))" > local.properties
          echo "ndk.dir=$NDK_DIR" >> local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          cat local.properties
          chmod +x gradlew
          # Run conan install explicitly first to populate build deps
          cd ..
          conan install . --output-folder=build --profile:host=default --profile:build=default 2>&1 | tail -20 || true
          cd platform/android
          ./gradlew :lib:assembleRelease --no-daemon 2>&1 | tee /tmp/build.log || true
          echo "=== Build outputs ==="
          find lib/build \( -name "*.aar" -o -name "*.so" \) -type f 2>/dev/null

      - name: Extract .so files from AAR
        working-directory: tt-client/platform/android
        run: |
          AAR=$(find lib/build -name "*.aar" -type f | head -1)
          if [ -z "$AAR" ]; then
            echo "ERROR: No AAR produced"
            find lib/build -type f | head -30
            exit 1
          fi
          echo "AAR: $AAR"
          rm -rf /tmp/native-libs-extracted
          mkdir -p /tmp/native-libs-extracted
          unzip -o "$AAR" -d /tmp/native-libs-extracted
          find /tmp/native-libs-extracted -name "*.so" -type f
          zip -j /tmp/trusttunnel-native-lib.zip $(find /tmp/native-libs-extracted -name "*.so" -type f)
          ls -la /tmp/trusttunnel-native-lib.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trusttunnel-native-lib
          path: /tmp/trusttunnel-native-lib.zip
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: native-build-logs
          path: /tmp/build.log
          retention-days: 5
