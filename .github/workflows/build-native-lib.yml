# .github/workflows/build-native-lib.yml
# Extracts pre-built TrustTunnel native library (.so files) from committed AAR.
# The AAR (native-libs/trusttunnel-release.aar) is the official
# com.adguard.trusttunnel:trusttunnel-client-android:1.1.3 from TrustTunnel.
# Artifact: trusttunnel-native-lib.zip containing .so files for all 4 ABIs.

name: Build Native Library

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract .so files from AAR
        run: |
          AAR="native-libs/trusttunnel-release.aar"
          if [ ! -f "$AAR" ]; then
            echo "ERROR: $AAR not found"
            exit 1
          fi
          echo "AAR: $(ls -lh $AAR)"

          rm -rf /tmp/tt-extract
          mkdir -p /tmp/tt-extract
          unzip -o "$AAR" -d /tmp/tt-extract

          echo "=== .so files ==="
          find /tmp/tt-extract -name "*.so" -type f -exec ls -lh {} \;

          # Create zip preserving jni/ABI/ directory structure
          cd /tmp/tt-extract
          zip -r /tmp/trusttunnel-native-lib.zip jni/
          ls -la /tmp/trusttunnel-native-lib.zip

      - name: Upload native lib artifact
        uses: actions/upload-artifact@v4
        with:
          name: trusttunnel-native-lib
          path: /tmp/trusttunnel-native-lib.zip
          retention-days: 30
