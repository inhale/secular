<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Screen 3 — Server Config</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #121212; --surface: #1E1E1E; --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08); --text: #FFFFFF; --text-dim: #8A8A8A;
    --accent: #00FF66; --red: #FF4D4D; --radius: 14px;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
    max-width: 390px; height: 844px; margin: 0 auto;
    position: relative; border: 1px solid var(--border);
  }
  .header {
    padding: 48px 24px 16px; flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 700; }

  .form-wrap {
    flex: 1; overflow-y: auto; padding: 0 24px 16px; scrollbar-width: none;
  }
  .form-wrap::-webkit-scrollbar { display: none; }

  .field-group { margin-bottom: 20px; }
  .field-label {
    display: block; font-size: 12px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
  }
  .field-input {
    width: 100%; background: rgba(255,255,255,0.04); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px; font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s;
    -webkit-appearance: none; appearance: none;
  }
  .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,255,102,0.1); }
  .field-input::placeholder { color: rgba(255,255,255,0.18); font-family: 'Inter', sans-serif; }
  textarea.field-input { resize: none; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; }

  .file-upload {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.04); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: border-color 0.2s;
  }
  .file-upload:active { border-color: var(--accent); }
  .file-upload .file-icon { flex-shrink: 0; color: var(--text-dim); }
  .file-upload .file-name {
    flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .file-upload .file-name.has-file { color: var(--text); }
  .password-wrap {
    position: relative;
  }
  .password-wrap .password-input {
    padding-right: 48px;
  }
  .password-toggle {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    padding: 4px; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s;
  }
  .password-toggle:hover { color: var(--text); }
  .password-toggle svg { display: block; }

  .protocol-dropdown {
    position: relative;
    width: 100%; background: rgba(255,255,255,0.04); border: 1.5px solid var(--border);
    border-radius: 12px; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s;
    cursor: pointer; user-select: none; -webkit-user-select: none;
  }
  .protocol-dropdown:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,255,102,0.1); }
  .protocol-selected {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-radius: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .protocol-options {
    display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #1E1E1E; border: 1.5px solid var(--border); border-radius: 12px;
    overflow: hidden; z-index: 50; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .protocol-options.open { display: block; }
  .protocol-option {
    padding: 14px 16px; font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color: var(--text); cursor: pointer; transition: background 0.15s;
  }
  .protocol-option:hover { background: rgba(0,255,102,0.08); }
  .protocol-option:active { background: rgba(0,255,102,0.12); }
  .protocol-arrow { color: var(--text-dim); transition: transform 0.2s; flex-shrink: 0; }
  .protocol-arrow.open { transform: rotate(180deg); }
  .file-upload .browse-btn {
    flex-shrink: 0; background: rgba(255,255,255,0.08); border: none; border-radius: 8px;
    padding: 6px 12px; color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .checkbox-row {
    display: flex; align-items: center; gap: 12px; padding: 4px 0;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .checkbox-row input[type="checkbox"] {
    appearance: none; -webkit-appearance: none; width: 22px; height: 22px;
    border: 2px solid var(--text-dim); border-radius: 6px; background: transparent;
    cursor: pointer; flex-shrink: 0; position: relative; transition: all 0.2s;
  }
  .checkbox-row input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
  .checkbox-row input[type="checkbox"]:checked::after {
    content: ''; position: absolute; left: 6px; top: 2px;
    width: 6px; height: 11px; border: solid #121212; border-width: 0 2.5px 2.5px 0;
    transform: rotate(45deg);
  }
  .checkbox-label { font-size: 14px; font-weight: 500; color: var(--text); }

  .save-btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    background: var(--accent); color: #121212; font-family: 'Inter', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: transform 0.1s; letter-spacing: -0.2px;
    box-shadow: 0 4px 24px rgba(0,255,102,0.25);
  }
  .save-btn:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(0,255,102,0.18); }
  .save-btn.saved { background: rgba(255,255,255,0.08); color: var(--text); box-shadow: none; }

  .toast {
    position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: #121212; padding: 12px 24px; border-radius: 12px;
    font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; white-space: nowrap; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,255,102,0.3);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Bottom Nav */
  .bottom-nav {
    display: flex; align-items: flex-end; justify-content: center;
    padding: 0 32px 28px; flex-shrink: 0; position: relative;
  }
  .nav-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; padding: 10px 0;
    color: var(--text-dim); transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 26px; height: 26px; }

  .page-label {
    text-align: center; font-size: 11px; color: rgba(255,255,255,0.15);
    letter-spacing: 2px; text-transform: uppercase; padding-bottom: 10px;
  }
  @media (min-width: 600px) {
    body { margin: 24px auto; border-radius: 32px; border: 2px solid var(--border); box-shadow: 0 0 60px rgba(0,0,0,0.8); }
    html { background: #0A0A0A; display: flex; min-height: 100vh; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>Frankfurt #1</h1>
</header>

<div class="form-wrap">
  <div class="field-group">
    <label class="field-label">Server Name</label>
    <input class="field-input" type="text" value="Frankfurt #1" />
  </div>
  <div class="field-group">
    <label class="field-label">IP Address</label>
    <input class="field-input" type="text" value="185.103.24.4" />
  </div>
  <div class="field-group">
    <label class="field-label">Hostname for TLS Handshake</label>
    <input class="field-input" type="text" value="de-frankfurt-01.secularvpn.io" placeholder="e.g. server.example.com" />
  </div>
  <div class="field-group">
    <label class="field-label">Username</label>
    <input class="field-input" type="text" value="user_8f3a2b" placeholder="Username" />
  </div>
  <div class="field-group">
    <label class="field-label">Password</label>
    <div class="password-wrap">
      <input class="field-input password-input" type="password" value="••••••••••••" placeholder="Password" id="passwordField" />
      <button class="password-toggle" id="passwordToggle" type="button" aria-label="Reveal password">
        <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
  </div>
  <div class="field-group">
    <label class="field-label">Protocol</label>
    <div class="protocol-dropdown" id="protocolDropdown">
      <div class="protocol-selected" onclick="toggleProtocolDropdown()">
        <span class="protocol-label" id="protocolValue">HTTPS/2</span>
        <svg class="protocol-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="protocol-options" id="protocolOptions">
        <div class="protocol-option" onclick="selectProtocol('HTTPS/2')">HTTPS/2</div>
        <div class="protocol-option" onclick="selectProtocol('QUIC')">QUIC</div>
      </div>
    </div>
  </div>
  <div class="field-group">
    <label class="field-label">DNS Servers</label>
    <textarea class="field-input" rows="4" placeholder="One DNS server per line">1.1.1.1
8.8.8.8
9.9.9.9</textarea>
  </div>
  <div class="field-group">
    <label class="field-label">Self-Signed Certificate (.pem)</label>
    <div class="file-upload" onclick="document.getElementById('certFile').click()">
      <input type="file" id="certFile" hidden accept=".pem,.crt,.cer" onchange="this.parentElement.querySelector('.file-name').textContent = this.files[0]?.name || 'No file selected'; this.parentElement.querySelector('.file-name').classList.toggle('has-file', !!this.files[0])">
      <span class="file-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </span>
      <span class="file-name" id="certFileName">No file selected</span>
      <span class="browse-btn">Browse</span>
    </div>
  </div>
  <div class="field-group">
    <label class="checkbox-row">
      <input type="checkbox" id="ipv6check" />
      <span class="checkbox-label">Allow IPv6 traffic</span>
    </label>
  </div>
  <div class="field-group" style="margin-top: 24px;">
    <button class="save-btn" id="saveBtn" onclick="saveConfig()">SAVE</button>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn" onclick="window.location.href='screen5.html'" aria-label="Query log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <path d="M6 2h10l4 4v16a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1z"/>
      <path d="M16 2v4a1 1 0 001 1h4"/>
      <line x1="9" y1="9" x2="15" y2="9"/>
      <line x1="9" y1="12" x2="15" y2="12"/>
      <line x1="9" y1="15" x2="13" y2="15"/>
      <path d="M19 4l-4-4v3a1 1 0 001 1h3z" fill="currentColor" stroke="none" opacity="0.12"/>
    </svg>
  </button>
  <button class="nav-btn home" onclick="window.location.href='screen1.html'" aria-label="Home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <path d="M3 9.5l9-7 9 7"/>
      <path d="M5 10v9a1 1 0 001 1h12a1 1 0 001-1v-9"/>
    </svg>
  </button>
  <button class="nav-btn" onclick="window.location.href='screen4.html'" aria-label="Add server">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="26" height="26">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>
</nav>

<div class="page-label">Screen 3 · Config</div>
<div class="toast" id="toast">Saved ✓</div>

<script>
  // Password toggle
  const pwToggle = document.getElementById('passwordToggle');
  const pwField = document.getElementById('passwordField');
  const eyeIcon = pwToggle.querySelector('.icon-eye');
  const eyeOffIcon = pwToggle.querySelector('.icon-eye-off');
  let passwordVisible = false;
  const realPassword = 'x9Kp2mQ7vBn4';
  pwToggle.addEventListener('click', () => {
    passwordVisible = !passwordVisible;
    pwField.type = passwordVisible ? 'text' : 'password';
    eyeIcon.style.display = passwordVisible ? 'none' : 'block';
    eyeOffIcon.style.display = passwordVisible ? 'block' : 'none';
  });

  // Protocol dropdown
  function toggleProtocolDropdown() {
    document.getElementById('protocolOptions').classList.toggle('open');
    document.querySelector('.protocol-arrow').classList.toggle('open');
  }
  function selectProtocol(val) {
    document.getElementById('protocolValue').textContent = val;
    document.getElementById('protocolOptions').classList.remove('open');
    document.querySelector('.protocol-arrow').classList.remove('open');
  }
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.protocol-dropdown')) {
      document.getElementById('protocolOptions').classList.remove('open');
      document.querySelector('.protocol-arrow').classList.remove('open');
    }
  });

  function saveConfig() {
    const btn = document.getElementById('saveBtn');
    btn.classList.add('saved');
    btn.textContent = 'SAVED ✓';
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
      btn.classList.remove('saved');
      btn.textContent = 'SAVE';
    }, 2000);
  }
</script>
</body>
</html>
