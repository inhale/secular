<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Screen 3 — Server Config</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #121212; --surface: #1E1E1E; --card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08); --text: #FFFFFF; --text-dim: #8A8A8A;
    --accent: #00FF66; --red: #FF4D4D; --radius: 14px;
  }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column;
    max-width: 390px; height: 844px; margin: 0 auto;
    position: relative; border: 1px solid var(--border);
  }
  .header {
    padding: 48px 24px 16px; flex-shrink: 0;
  }
  .header h1 { font-size: 18px; font-weight: 700; }

  .form-wrap {
    flex: 1; overflow-y: auto; padding: 0 24px 16px; scrollbar-width: none;
  }
  .form-wrap::-webkit-scrollbar { display: none; }

  .field-group { margin-bottom: 20px; }
  .field-label {
    display: block; font-size: 12px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
  }
  .field-input {
    width: 100%; background: rgba(255,255,255,0.04); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px; font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s;
    -webkit-appearance: none; appearance: none;
  }
  .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,255,102,0.1); }
  .field-input::placeholder { color: rgba(255,255,255,0.18); font-family: 'Inter', sans-serif; }
  textarea.field-input { resize: none; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; }

  .file-upload {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.04); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: border-color 0.2s;
  }
  .file-upload:active { border-color: var(--accent); }
  .file-upload .file-icon { flex-shrink: 0; color: var(--text-dim); }
  .file-upload .file-name {
    flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .file-upload .file-name.has-file { color: var(--text); }
  .file-upload .browse-btn {
    flex-shrink: 0; background: rgba(255,255,255,0.08); border: none; border-radius: 8px;
    padding: 6px 12px; color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer;
  }
  .checkbox-row {
    display: flex; align-items: center; gap: 12px; padding: 4px 0;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .checkbox-row input[type="checkbox"] {
    appearance: none; -webkit-appearance: none; width: 22px; height: 22px;
    border: 2px solid var(--text-dim); border-radius: 6px; background: transparent;
    cursor: pointer; flex-shrink: 0; position: relative; transition: all 0.2s;
  }
  .checkbox-row input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
  .checkbox-row input[type="checkbox"]:checked::after {
    content: ''; position: absolute; left: 6px; top: 2px;
    width: 6px; height: 11px; border: solid #121212; border-width: 0 2.5px 2.5px 0;
    transform: rotate(45deg);
  }
  .checkbox-label { font-size: 14px; font-weight: 500; color: var(--text); }

  .save-btn {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    background: var(--accent); color: #121212; font-family: 'Inter', sans-serif;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: transform 0.1s; letter-spacing: -0.2px;
    box-shadow: 0 4px 24px rgba(0,255,102,0.25);
  }
  .save-btn:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(0,255,102,0.18); }
  .save-btn.saved { background: rgba(255,255,255,0.08); color: var(--text); box-shadow: none; }

  .toast {
    position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: #121212; padding: 12px 24px; border-radius: 12px;
    font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; white-space: nowrap; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,255,102,0.3);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Bottom Nav */
  .bottom-nav {
    display: flex; align-items: center; justify-content: center;
    padding: 0 32px 36px; flex-shrink: 0; position: relative;
  }
  .nav-btn {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; padding: 10px 0;
    color: var(--text-dim); transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 26px; height: 26px; }
  .nav-btn.home .home-circle {
    width: 52px; height: 52px;
    background: var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; color: #121212;
    margin-top: -12px; box-shadow: 0 4px 24px rgba(0,255,102,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .nav-btn.home:active .home-circle {
    transform: scale(0.93); box-shadow: 0 2px 12px rgba(0,255,102,0.25);
  }
  .nav-btn.add .add-circle {
    width: 40px; height: 40px;
    border: 2px solid var(--text-dim); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; color: var(--text-dim);
    transition: transform 0.15s;
  }
  .nav-btn.add:active .add-circle {
    transform: scale(0.93); border-color: var(--accent); color: var(--accent);
  }

  .page-label {
    text-align: center; font-size: 11px; color: rgba(255,255,255,0.15);
    letter-spacing: 2px; text-transform: uppercase; padding-bottom: 10px;
  }
  @media (min-width: 600px) {
    body { margin: 24px auto; border-radius: 32px; border: 2px solid var(--border); box-shadow: 0 0 60px rgba(0,0,0,0.8); }
    html { background: #0A0A0A; display: flex; min-height: 100vh; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>Frankfurt #1</h1>
</header>

<div class="form-wrap">
  <div class="field-group">
    <label class="field-label">Server Name</label>
    <input class="field-input" type="text" value="Frankfurt #1" />
  </div>
  <div class="field-group">
    <label class="field-label">IP Address</label>
    <input class="field-input" type="text" value="185.103.24.4" />
  </div>
  <div class="field-group">
    <label class="field-label">Hostname for TLS Handshake</label>
    <input class="field-input" type="text" value="de-frankfurt-01.secularvpn.io" placeholder="e.g. server.example.com" />
  </div>
  <div class="field-group">
    <label class="field-label">Username</label>
    <input class="field-input" type="text" value="user_8f3a2b" placeholder="Username" />
  </div>
  <div class="field-group">
    <label class="field-label">Password</label>
    <input class="field-input" type="password" value="••••••••••••" placeholder="Password" />
  </div>
  <div class="field-group">
    <label class="field-label">Protocol</label>
    <div class="field-input" style="display:flex;align-items:center;gap:8px;">
      <svg viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" style="color:var(--accent);flex-shrink:0;">
        <path d="M128,72a56,56,0,1,0,56,56A56.06,56.06,0,0,0,128,72Zm0,104a48,48,0,1,1,48-48A48.05,48.05,0,0,1,128,176Z"/>
      </svg>
      <span style="font-family:'JetBrains Mono',monospace;font-size:14px;">TrustTunnel</span>
    </div>
  </div>
  <div class="field-group">
    <label class="field-label">DNS Servers</label>
    <textarea class="field-input" rows="4" placeholder="One DNS server per line">1.1.1.1
8.8.8.8
9.9.9.9</textarea>
  </div>
  <div class="field-group">
    <label class="field-label">Self-Signed Certificate (.pem)</label>
    <div class="file-upload" onclick="document.getElementById('certFile').click()">
      <input type="file" id="certFile" hidden accept=".pem,.crt,.cer" onchange="this.parentElement.querySelector('.file-name').textContent = this.files[0]?.name || 'No file selected'; this.parentElement.querySelector('.file-name').classList.toggle('has-file', !!this.files[0])">
      <span class="file-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </span>
      <span class="file-name" id="certFileName">No file selected</span>
      <span class="browse-btn">Browse</span>
    </div>
  </div>
  <div class="field-group">
    <label class="checkbox-row">
      <input type="checkbox" id="ipv6check" />
      <span class="checkbox-label">Allow IPv6 traffic</span>
    </label>
  </div>
  <div class="field-group" style="margin-top: 24px;">
    <button class="save-btn" id="saveBtn" onclick="saveConfig()">SAVE</button>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn" onclick="window.location.href='screen2.html'" aria-label="Server list">
    <svg viewBox="0 0 26 26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="8" height="8" rx="1.5"/>
      <rect x="16" y="2" width="8" height="8" rx="1.5"/>
      <rect x="2" y="16" width="8" height="8" rx="1.5"/>
      <rect x="16" y="16" width="8" height="8" rx="1.5"/>
    </svg>
  </button>
  <button class="nav-btn home" onclick="window.location.href='screen1.html'" aria-label="Home">
    <div class="home-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24">
        <path d="M3 9.5l9-7 9 7"/>
        <path d="M5 10v9a1 1 0 001 1h12a1 1 0 001-1v-9"/>
      </svg>
    </div>
  </button>
  <button class="nav-btn add" onclick="window.location.href='screen4.html'" aria-label="Add server">
    <div class="add-circle">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" width="20" height="20">
        <line x1="10" y1="4" x2="10" y2="16"/>
        <line x1="4" y1="10" x2="16" y2="10"/>
      </svg>
    </div>
  </button>
</nav>

<div class="page-label">Screen 3 · Config</div>
<div class="toast" id="toast">Saved ✓</div>

<script>
  function saveConfig() {
    const btn = document.getElementById('saveBtn');
    btn.classList.add('saved');
    btn.textContent = 'SAVED ✓';
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => {
      toast.classList.remove('show');
      btn.classList.remove('saved');
      btn.textContent = 'SAVE';
    }, 2000);
  }
</script>
</body>
</html>
