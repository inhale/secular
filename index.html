<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secular VPN — UI / UX Concept</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0A0A0A; --text: #FFFFFF; --text-dim: #8A8A8A;
    --accent: #00FF66; --border: rgba(255,255,255,0.08);
  }
  html, body { width: 100%; min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  body { padding: 32px 24px; }
  h1 { text-align: center; font-size: 14px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; }
  .subtitle { text-align: center; font-size: 11px; color: rgba(255,255,255,0.25); margin-bottom: 8px; letter-spacing: 1px; }
  .repo-link { text-align: center; font-size: 11px; color: var(--accent); margin-bottom: 32px; }
  .repo-link a { color: var(--accent); text-decoration: none; }
  .repo-link a:hover { text-decoration: underline; }
  .screens-grid { display: flex; gap: 20px; justify-content: center; align-items: flex-start; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 24px; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
  .screens-grid::-webkit-scrollbar { height: 6px; }
  .screens-grid::-webkit-scrollbar-track { background: transparent; }
  .screens-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  .screen-col { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .screen-label { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; text-align: center; }
  .screen-label .num { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--accent); color: var(--accent); font-size: 10px; font-weight: 700; margin-right: 6px; }
  .phone-frame { width: 280px; height: 600px; background: #121212; border-radius: 28px; border: 2px solid var(--border); overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 80px rgba(0,255,102,0.03); position: relative; }
  .phone-frame iframe { width: 390px; height: 844px; border: none; transform-origin: top left; transform: scale(0.7179); pointer-events: auto; }
  .phone-frame::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 22px; background: #121212; border-radius: 0 0 14px 14px; z-index: 10; }
  .phone-frame::after { content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 80px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; z-index: 10; }
  .footer { text-align: center; margin-top: 32px; font-size: 11px; color: rgba(255,255,255,0.2); }
  @media (max-width: 1300px) { .screens-grid { flex-wrap: wrap; } }
</style>
</head>
<body>

<h1>Secular VPN</h1>
<p class="subtitle">UI / UX Concept — Mobile First · Dark Mode</p>
<p class="repo-link"><a href="https://github.com/inhale/secular" target="_blank">github.com/inhale/secular</a></p>

<div class="screens-grid">
  <div class="screen-col">
    <div class="screen-label"><span class="num">1</span>Dashboard</div>
    <div class="phone-frame"><iframe src="screen1.html" title="Screen 1 — Dashboard"></iframe></div>
  </div>
  <div class="screen-col">
    <div class="screen-label"><span class="num">2</span>Server List</div>
    <div class="phone-frame"><iframe src="screen2.html" title="Screen 2 — Server List"></iframe></div>
  </div>
  <div class="screen-col">
    <div class="screen-label"><span class="num">3</span>Config</div>
    <div class="phone-frame"><iframe src="screen3.html" title="Screen 3 — Server Config"></iframe></div>
  </div>
  <div class="screen-col">
    <div class="screen-label"><span class="num">4</span>Add Server</div>
    <div class="phone-frame"><iframe src="screen4.html" title="Screen 4 — Add Server"></iframe></div>
  </div>
</div>

<p class="footer">Secular VPN — Unblockable. Digital freedom.</p>

</body>
</html>
